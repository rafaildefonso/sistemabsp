<!--
  ═══════════════════════════════════════════════════════════════
  SISTEMABSP — DASHBOARD WEB
  ═══════════════════════════════════════════════════════════════
  Versão : 5.0
  Data   : 30/05/2026

  CHANGELOG:

  v8.0 — 01/06/2026
    + Autenticação email+senha com SHA-256 (aba _Usuarios).
    + Sessão persistente 24h (localStorage).
    + LoginScreen: modo real pede credenciais; modo demo mantém nome+cargo.

  v7.4 — 31/05/2026 (patch)
    CRÍTICO: hooks violation corrigida (useContext em IIFE).
    1. PDF exporta com accentColor das configurações.
    2. Cards do plantel menores (mais atletas visíveis).
    3. Notificações clicáveis navegam para a página correta.
    4. Notif 'atletas em recuperação' não repete após ser limpa (volta no próximo dia).
    5. Treinos renomeado para Questionários; ACWR usa só dados de formulários.
    6. Scatter PSE × Carga UA por atleta (Questionários + perfil individual).
    7. Antropometria: seletor grupo/atleta, gráfico adaptativo, seletor N avaliações.
    8. Dep. Médico: filtro atleta+data, click em gráficos filtra KPIs e lista.
    9. Formulários: auto-carrega links da aba _INSTALACAO com 1 clique.

  v7.3 — 31/05/2026
    * Bug A: normalizeDateStr trata datas M/D/YYYY do StatSports (dia/mês invertidos).
    * Bug B: parseGPS usa pNum() tolerante a vírgula decimal (StatSports exporta '88,09').
    Ambos descobertos via teste com planilha real.

  v7.2 — 31/05/2026
    * CORREÇÃO: 6 bugs corrigidos (sidebar duplicado, ícone X, ícones ausentes,
      style duplicado, useMemo deps, inputs de formulários).

  v7.1 — 31/05/2026
    * CORREÇÃO: revertido o cache-buster (&_cb) e cache:'no-store' do fetchSheet
      que estava a quebrar a ligação à API do Google Sheets (0 atletas).
      Restaurada a chamada idêntica à v4 que funcionava.

  v7.0 — 30/05/2026 (Fases 2 e 3 da reformulação)
    BUSCA E NAVEGAÇÃO:
    + Busca global funcional no topo: atletas (nome/apelido/posição) e páginas,
      com resultados clicáveis que navegam directamente.
    + Botão "Novo Registro" abre menu com os formulários e leva à página Formulários.
    NOTIFICAÇÕES:
    + Sistema de notificações real: detecta novos registos comparando com snapshot.
    + Agrupamento automático ("12 novas respostas de bem-estar").
    + Estados lido/não lido, contador no sino, limpar tudo.
    CONFIGURAÇÕES (nova página):
    + Aparência: tema escuro/claro/automático + cor principal (6 presets + custom).
    + Relatórios PDF: nome da equipa, cor, logo (upload) e rodapé personalizáveis.
    + Dados: estado da ligação, planilha, última sincronização, desligar.
    + Atualização: intervalo manual/5/15/30 min (aplica-se ao auto-refresh).
    + Notificações: ativar/desativar, agrupar, som.
    EXPORTAÇÃO PDF REFORMULADA:
    + Filtro de período no relatório colectivo (Hoje/7/14/21 dias).
    + Tabela completa: Atleta, Posição, Status, Bem-estar, PSE, ACWR, Fonte, Dores.
    + Branding aplicado (logo, cor, nome da equipa, rodapé) nos dois relatórios.

  v6.0 — 30/05/2026 (Fase 1 da reformulação)
    + Cards individuais de atletas no topo do dashboard, com bem-estar/PSE/
      ACWR/dores do dia, indicador de risco e clique para abrir o perfil.
    + ACWR com 3 níveis de prioridade: GPS do dia → histórico GPS → carga interna.
    + Indicador de fonte do ACWR (GPS / Carga Interna) e flag "GPS hoje".
    + Indicadores de completude diária (X de Y responderam bem-estar/PSE).
    + Ordenação dos cards: alfabética, status, ACWR, bem-estar, PSE, posição.
    + Navegação inteligente: KPIs e widgets do dashboard agora abrem a página
      detalhada correspondente (atletas, treinos, GPS, lesões).
    * Refresh sem F5: cache-busting na API do Sheets garante dados frescos.

  v5.0 — 30/05/2026
    * CORREÇÃO CRÍTICA: dados reais não apareciam porque os filtros de
      data dependiam do campo "dateObj" que as funções de parsing não
      criavam. Adicionado dateObj + normalização de datas em todas as
      funções de parsing (GPS, wellness, pós-treino, antropometria, lesões).
    + Filtro de período "HOJE" (dia único) + opção 21 dias, em Treinos e GPS.
    + Normalização universal de datas (DD/MM/YYYY → YYYY-MM-DD).
    * Cálculo de idade dos atletas corrigido para formato brasileiro.
    * Dependências dos useMemo corrigidas (recalculam ao actualizar dados).
    * Defaults seguros (= []) em todas as leituras de dados.
    * Antropometria/Lesões: divisões por zero corrigidas; campo location
      e dias de recuperação corrigidos. Match por atleta sem fallback errado.

  v4.0 — 26/05/2026
    + Auto-refresh 5 min + botão manual com timestamp.
    + Página de Formulários com links reais (Opção C).
    + Export PDF individual e colectivo.
    * Match GPS por ID_Atleta (ignora SEM_CADASTRO).

  v3.0 — Login simplificado (nome/cargo); páginas ligadas ao DataContext.
  v2.0 — Ligação Google Sheets API; ecrã de setup; auto-reconexão.
  v1.0 — Versão inicial com dados mock.
  ═══════════════════════════════════════════════════════════════
-->

<style>
  /* ═══════════════════════════════════════════════════════════════
     SISTEMABSP — DESIGN SYSTEM
     Aesthetic: Editorial sports terminal × futuristic command center
     ═══════════════════════════════════════════════════════════════ */
  
  :root {
    /* Brand palette */
    --bg-primary: #0A0E13;
    --bg-secondary: #0F1419;
    --bg-tertiary: #161C24;
    --bg-elevated: #1C242E;
    --bg-hover: #232C38;
    
    /* Accents */
    --accent-primary: #C5FF3E;     /* Lime electric — performance */
    --accent-primary-dim: #8AB827;
    --accent-secondary: #00D9FF;   /* Cyan — data */
    --accent-warning: #FF9E2C;     /* Orange — alert */
    --accent-danger: #FF3B5C;      /* Red — critical */
    --accent-success: #00E676;     /* Green — healthy */
    --accent-purple: #B794F6;      /* Purple — special */
    
    /* Text */
    --text-primary: #F4F5F7;
    --text-secondary: #A8B0BD;
    --text-tertiary: #6B7484;
    --text-quaternary: #4A5260;
    
    /* Borders */
    --border-subtle: rgba(255,255,255,0.06);
    --border-default: rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.18);
    
    /* Effects */
    --glow-primary: 0 0 40px rgba(197,255,62,0.15);
    --glow-secondary: 0 0 30px rgba(0,217,255,0.20);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
    --shadow-md: 0 8px 24px rgba(0,0,0,0.4);
    --shadow-lg: 0 16px 48px rgba(0,0,0,0.5);
    
    /* Typography */
    --font-display: 'Bebas Neue', sans-serif;
    --font-headline: 'Syne', sans-serif;
    --font-body: 'Manrope', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    
    /* Layout */
    --sidebar-w: 80px;
    --header-h: 64px;
  }
  
  *, *::before, *::after { box-sizing: border-box; }
  
  html, body, #root {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-feature-settings: 'ss01', 'cv11';
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  
  body {
    background:
      radial-gradient(1200px 800px at 85% -10%, rgba(197,255,62,0.04), transparent 50%),
      radial-gradient(1000px 600px at -10% 110%, rgba(0,217,255,0.04), transparent 50%),
      var(--bg-primary);
    overflow: hidden;
  }
  
  /* Grain overlay for texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none; z-index: 9999;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  
  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
  
  /* Selection */
  ::selection { background: var(--accent-primary); color: var(--bg-primary); }
  
  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 20px rgba(197,255,62,0.2); }
    50% { box-shadow: 0 0 40px rgba(197,255,62,0.4); }
  }
  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }
  
  .animate-fadeUp { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
  .animate-fadeIn { animation: fadeIn 0.4s ease both; }
  .animate-slideIn { animation: slideInLeft 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
  .animate-pulse-soft { animation: pulse 2s ease-in-out infinite; }
  .animate-glow { animation: glow 3s ease-in-out infinite; }
  
  /* Stagger delays */
  .stagger-1 { animation-delay: 0.05s; }
  .stagger-2 { animation-delay: 0.10s; }
  .stagger-3 { animation-delay: 0.15s; }
  .stagger-4 { animation-delay: 0.20s; }
  .stagger-5 { animation-delay: 0.25s; }
  .stagger-6 { animation-delay: 0.30s; }
  
  /* Utility classes */
  .mono { font-family: var(--font-mono); }
  .display { font-family: var(--font-display); letter-spacing: 0.02em; }
  .headline { font-family: var(--font-headline); letter-spacing: -0.02em; }
  
  /* Tabular numbers for stats */
  .tabular { font-variant-numeric: tabular-nums; }
  
  /* Card base */
  .card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    transition: all 0.2s ease;
  }
  .card:hover { border-color: var(--border-default); }
  
  /* Button base */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    border-radius: 8px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent-primary);
    color: var(--bg-primary);
  }
  .btn-primary:hover {
    background: var(--accent-primary);
    box-shadow: var(--glow-primary);
    transform: translateY(-1px);
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-primary);
    border-color: var(--border-default);
  }
  .btn-ghost:hover {
    background: var(--bg-elevated);
    border-color: var(--border-strong);
  }
  .btn-danger {
    background: var(--accent-danger);
    color: white;
  }
  
  /* Input base */
  .input {
    width: 100%;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-default);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 14px;
    transition: all 0.15s;
  }
  .input:focus {
    outline: none;
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 3px rgba(197,255,62,0.1);
  }
  .input::placeholder { color: var(--text-quaternary); }
  
  /* Label */
  .label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-tertiary);
    font-weight: 600;
    margin-bottom: 6px;
    font-family: var(--font-mono);
  }
  
  /* Badge */
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  
  /* Loading shimmer */
  .shimmer {
    background: linear-gradient(90deg, var(--bg-tertiary), var(--bg-elevated), var(--bg-tertiary));
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }
  
  /* Sidebar nav item */
  .nav-item {
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 12px;
    color: var(--text-tertiary);
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
  }
  .nav-item:hover { color: var(--text-primary); background: var(--bg-elevated); }
  .nav-item.active { 
    color: var(--bg-primary); 
    background: var(--accent-primary);
    box-shadow: var(--glow-primary);
  }
  .nav-item .nav-tooltip {
    position: absolute; left: 60px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    padding: 6px 10px; border-radius: 6px;
    font-size: 12px; white-space: nowrap;
    opacity: 0; pointer-events: none;
    transition: opacity 0.15s;
    z-index: 100;
  }
  .nav-item:hover .nav-tooltip { opacity: 1; }
  
  /* Decorative grid pattern (used selectively) */
  .grid-bg {
    background-image:
      linear-gradient(var(--border-subtle) 1px, transparent 1px),
      linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  
  /* Glow text */
  .text-glow-primary { 
    color: var(--accent-primary);
    text-shadow: 0 0 20px rgba(197,255,62,0.4);
  }
  
  /* Scoreboard digital style */
  .digital {
    font-family: var(--font-mono);
    font-feature-settings: 'tnum';
    letter-spacing: 0.02em;
  }
  
  /* Custom checkbox */
  .check-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
  }
  .check-item {
    padding: 8px 12px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-default);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    text-align: center;
    transition: all 0.15s;
    user-select: none;
  }
  .check-item:hover { border-color: var(--border-strong); }
  .check-item.selected {
    background: var(--accent-primary);
    color: var(--bg-primary);
    border-color: var(--accent-primary);
    font-weight: 600;
  }
  
  /* Slider */
  .scale-slider {
    display: flex; gap: 4px;
  }
  .scale-btn {
    flex: 1;
    aspect-ratio: 1;
    border-radius: 8px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-default);
    color: var(--text-secondary);
    font-weight: 700;
    font-family: var(--font-mono);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 14px;
  }
  .scale-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
  .scale-btn.selected {
    background: var(--accent-primary);
    color: var(--bg-primary);
    border-color: var(--accent-primary);
    transform: scale(1.05);
  }
  
  /* Modal backdrop */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s;
  }
  
  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    border-left: 3px solid var(--accent-primary);
    padding: 14px 20px;
    border-radius: 10px;
    box-shadow: var(--shadow-lg);

  .body-region {
    cursor: pointer;
    transition: all 0.15s;

  .body-region:hover { fill: var(--accent-secondary) !important; }

    aspect-ratio: 1;

    display: flex;
    border-bottom: 1px solid var(--border-default);

  }
  .tab {
    padding: 12px 20px;

  .tab.active {
    color: var(--accent-primary);
    border-bottom-color: var(--accent-primary);
  }
  
  /* Login screen specific */
  .login-bg {
    position: fixed; inset: 0;
    background:
      radial-gradient(800px 600px at 20% 30%, rgba(197,255,62,0.08), transparent 60%),
      radial-gradient(800px 600px at 80% 70%, rgba(0,217,255,0.06), transparent 60%),

  /* Splash logo animation */

    from { stroke-dashoffset: 1000; }
    to { stroke-dashoffset: 0; }
  }
  
  /* Responsive */
  @media (max-width: 768px) {
    :root { --sidebar-w: 64px; }
  }
</style>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
// React hooks and Recharts components
const { useState, useEffect, useMemo, useRef, useCallback } = React;
const {
  LineChart, Line, AreaChart, Area, BarChart, Bar, RadarChart, Radar,
  PolarGrid, PolarAngleAxis, PolarRadiusAxis, PieChart, Pie, Cell,
  XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
  ScatterChart, Scatter, ReferenceLine, ComposedChart
} = Recharts;

// ═══════════════════════════════════════════════════════════════
// MOCK DATA — Realistic football performance data
// ═══════════════════════════════════════════════════════════════

const TEAM_NAME = "BSP";
const SEASON = "2025/26";

// ═══════════════════════════════════════════════════════════════
// CONFIGURAÇÕES — persistência, tema e cores
// ═══════════════════════════════════════════════════════════════
const SETTINGS_KEY = 'bsp_settings';

const DEFAULT_SETTINGS = {
  theme: 'dark',              // dark | light | auto
  accentColor: '#C5FF3E',     // cor principal
  teamName: 'BSP',
  pdfColor: '#C5FF3E',
  pdfFooter: 'SistemaBSP',
  pdfLogo: '',                // dataURL opcional
  refreshInterval: 5,         // minutos (0 = manual)
  notifEnabled: true,
  notifSound: false,
  notifGroup: true,
  language: ''       // '' = auto-detect | 'pt-BR' | 'pt-PT' | 'en'
};

// Paleta de cores principais disponíveis
const ACCENT_PRESETS = [
  { name: 'Verde-lima', value: '#C5FF3E' },
  { name: 'Azul',       value: '#3B9EFF' },
  { name: 'Vermelho',   value: '#FF4D4D' },
  { name: 'Roxo',       value: '#B794F6' },
  { name: 'Laranja',    value: '#FF9F40' },
  { name: 'Ciano',      value: '#00D9FF' }
];

function getSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    return raw ? { ...DEFAULT_SETTINGS, ...JSON.parse(raw) } : { ...DEFAULT_SETTINGS };
  } catch { return { ...DEFAULT_SETTINGS }; }
}

function saveSettings(s) {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch {}
}

function getTeamName() {
  return getSettings().teamName || TEAM_NAME;
}

// ═══════════════════════════════════════════════════════════════
// I18N — INTERNACIONALIZAÇÃO (pt-BR | pt-PT | en)
// ═══════════════════════════════════════════════════════════════

/** Devolve o código de idioma activo. */
function getActiveLang() {
  const s = getSettings();
  if (s.language && s.language !== '') return s.language;
  const nav = (navigator.language || 'pt-BR').toLowerCase();
  if (nav.startsWith('pt-pt') || nav.startsWith('pt-ao') || nav.startsWith('pt-mz')) return 'pt-PT';
  if (nav.startsWith('en'))  return 'en';
  return 'pt-BR';
}

/**
 * Traduzir string da UI.
 * @param {string} path - dotted path, e.g. 'nav.overview', 'acwr.ideal'
 * @param {...string} args - substituições posicionais (%s)
 */
function tUI(path, ...args) {
  const lang = getActiveLang();
  const dict = UI_LANG[lang] || UI_LANG['pt-BR'];
  const parts = path.split('.');
  let val = dict;
  for (const p of parts) {
    val = val ? val[p] : undefined;
    if (val === undefined) {
      // fallback to pt-BR
      let fb = UI_LANG['pt-BR'];
      for (const p2 of parts) { fb = fb ? fb[p2] : undefined; }
      return (typeof fb === 'string' ? fb : path);
    }
  }
  if (typeof val !== 'string') return path;
  return args.reduce((s, a) => s.replace('%s', a), val);
}

/** Normaliza string para comparação: minúsculas, sem acentos, trim */
function _norm(s) {
  return (s || '').toString().toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '').trim();
}

/**
 * Encontra o índice de uma coluna nos headers pelo fieldId do COLUMN_MAP.
 * Primeiro tenta match exacto, depois parcial.
 * @returns {number} índice (0-based) ou -1
 */
function findCol(headers, fieldId) {
  const keywords = COLUMN_MAP[fieldId];
  if (!keywords || !headers) return -1;
  const normed = headers.map(_norm);
  // 1. Match exacto
  for (const kw of keywords) {
    const idx = normed.indexOf(_norm(kw));
    if (idx !== -1) return idx;
  }
  // 2. Match parcial (a coluna contém a keyword ou vice-versa)
  for (const kw of keywords) {
    const nkw = _norm(kw);
    const idx = normed.findIndex(h => h.includes(nkw) || nkw.includes(h));
    if (idx !== -1) return idx;
  }
  return -1;
}

/**
 * Lê o valor de uma linha pelo fieldId.
 * @returns {string} valor ou ''
 */
function getVal(row, headers, fieldId) {
  const idx = findCol(headers, fieldId);
  return idx !== -1 ? (row[idx] ?? '') : '';
}

const TAB_KEYWORDS = {
  cadastro:   ['cadastro', 'registo', 'registration', 'player', 'atleta'],
  preTreino:  ['pretreino', 'pre-treino', 'pre_treino', 'pretraining', 'pre-training', '2a'],
  posTreino:  ['postreino', 'pos-treino', 'pos_treino', 'posttraining', 'post-training', '3'],
  gps:        ['gps', '5_gps'],
  antro:      ['antro', 'antropometria', 'anthropometry', '4_'],
  lesoes:     ['lesoes', 'lesão', 'lesao', 'injuries', 'injury', '5_le'],
};

function findTabByKeywords(titles, keywords) {
  const normed = titles.map(t => ({ original: t, norm: _norm(t) }));
  for (const kw of keywords) {
    const nkw = _norm(kw);
    const found = normed.find(t => t.norm.includes(nkw) || nkw.includes(t.norm));
    if (found) return found.original;
  }
  return null;
}

/**
 * Chama a API de metadados do Google Sheets para listar os títulos das abas.
 * Devolve um objecto { cadastro, preTreino, posTreino, gps, antro, lesoes }
 * com os nomes reais, ou null em caso de erro.
 */
async function detectarAbas(spreadsheetId, apiKey) {
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}?key=${apiKey}&fields=sheets.properties.title`;
    const resp = await fetch(url);
    if (!resp.ok) return null;
    const json = await resp.json();
    const titles = (json.sheets || []).map(s => s.properties.title);
    if (!titles.length) return null;
    return {
      cadastro:   findTabByKeywords(titles, TAB_KEYWORDS.cadastro)   || null,
      preTreino:  findTabByKeywords(titles, TAB_KEYWORDS.preTreino)   || null,
      posTreino:  findTabByKeywords(titles, TAB_KEYWORDS.posTreino)   || null,
      gps:        findTabByKeywords(titles, TAB_KEYWORDS.gps)         || null,
      antro:      findTabByKeywords(titles, TAB_KEYWORDS.antro)       || null,
      lesoes:     findTabByKeywords(titles, TAB_KEYWORDS.lesoes)      || null,
    };
  } catch (e) {
    console.warn('detectarAbas failed:', e.message);
    return null;
  }
}



// Clareia/escurece uma cor hex por uma percentagem (-100 a 100)
function shadeColor(hex, percent) {
  const num = parseInt(hex.replace('#',''), 16);
  let r = (num >> 16) & 0xff, g = (num >> 8) & 0xff, b = num & 0xff;
  const t = percent < 0 ? 0 : 255;
  const p = Math.abs(percent) / 100;
  r = Math.round((t - r) * p) + r;
  g = Math.round((t - g) * p) + g;
  b = Math.round((t - b) * p) + b;
  return '#' + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
}

// Aplica tema (dark/light) e cor principal às variáveis CSS globais
function aplicarTema(settings) {
  const s = settings || getSettings();
  const root = document.documentElement;

  // Resolver tema automático
  let theme = s.theme;
  if (theme === 'auto') {
    theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }

  // Cor principal e derivadas
  const accent = s.accentColor || '#C5FF3E';
  root.style.setProperty('--accent-primary', accent);
  root.style.setProperty('--accent-primary-dim', shadeColor(accent, -30));
  root.style.setProperty('--glow-primary', `0 0 40px ${accent}26`);

  // Tema claro / escuro
  if (theme === 'light') {
    root.style.setProperty('--bg-primary', '#F7F8FA');
    root.style.setProperty('--bg-secondary', '#FFFFFF');
    root.style.setProperty('--bg-tertiary', '#EEF0F4');
    root.style.setProperty('--bg-elevated', '#FFFFFF');
    root.style.setProperty('--bg-hover', '#E8EBF0');

    // Restaurar valores escuros padrão (idênticos ao CSS base)
    root.style.setProperty('--bg-primary', '#0A0E13');

// Helper: deterministic random based on seed
function seedRandom(seed) {
  let s = seed;
  return () => {
    s = (s * 9301 + 49297) % 233280;
    return s / 233280;
  };
}

const rand = seedRandom(42);

function randBetween(min, max) {
  return min + rand() * (max - min);
}

function randInt(min, max) {
  return Math.floor(randBetween(min, max + 1));
}

function pick(arr) {
  return arr[Math.floor(rand() * arr.length)];
}

// Generate 60 days of pre/post training data per athlete
function generateTrainingData(athletes) {
  const data = [];
  const today = new Date();
  
  athletes.forEach((athlete, athIdx) => {
    if (athlete.status === "Lesionado") return;
    
    // Athlete-specific baseline (some recover better, some have higher fatigue)
    const baselineFatigue = randBetween(2.0, 3.5);
    const basePSE = randBetween(5.5, 7.5);
    
    for (let d = 60; d >= 0; d--) {
      const date = new Date(today);
      date.setDate(date.getDate() - d);
      const dayOfWeek = date.getDay();
      
      // Skip Sundays (rest day) — most of the time
      if (dayOfWeek === 0 && rand() > 0.2) continue;
      
      // Match days (Saturday) have higher PSE
      const isMatchDay = dayOfWeek === 6 && rand() > 0.4;
      const isHighIntensity = isMatchDay || rand() > 0.7;
      
      // Pre-training (well-being)
      const sono = Math.max(1, Math.min(5, Math.round(randBetween(3, 5))));
      const fadiga = Math.max(1, Math.min(5, Math.round(baselineFatigue + randBetween(-0.5, 1.5))));
      const humor = Math.max(1, Math.min(5, Math.round(randBetween(3.5, 5))));
      const stress = Math.max(1, Math.min(5, Math.round(randBetween(2, 4))));
      const dorMuscular = Math.max(1, Math.min(5, Math.round(randBetween(1.5, 3.5))));
      const wellness = +((sono + (6-fadiga) + humor + (6-stress) + (6-dorMuscular)) / 5).toFixed(1);
      
      // Pre-pain regions (sometimes)
      const painRegions = [];
      if (rand() > 0.85) painRegions.push(pick(["Coxa D.", "Coxa E.", "Joelho D.", "Panturrilha D.", "Tornozelo E.", "Lombar"]));
      
      // Post-training
      const duration = isMatchDay ? randInt(85, 95) : randInt(60, 110);
      const pse = Math.max(1, Math.min(10, Math.round(basePSE + (isHighIntensity ? 1.5 : 0) + randBetween(-1, 1))));
      const internalLoad = pse * duration;
      const peso = athlete.weight + randBetween(-1, 0.5);
      const monotony = +randBetween(0.8, 2.2).toFixed(2);
      
      data.push({
        athleteId: athlete.id,
        athleteName: athlete.name,
        athleteNick: athlete.nick,
        position: athlete.position,
        date: date.toISOString().split('T')[0],
        dateObj: date,
        dayOfWeek,
        isMatchDay,
        // Pre
        sono, fadiga, humor, stress, dorMuscular,
        wellness,
        painRegions,
        // Post
        duration,
        pse,
        internalLoad,
        peso: +peso.toFixed(1),
        monotony,
        // Status
        type: isMatchDay ? "Jogo" : "Treino"
      });
    }
  });
  
  return data;
}

// Generate GPS data — last 30 sessions per athlete
function generateGPSData(athletes, trainingData) {
  const gpsData = [];
  const sessions = new Map();
  trainingData.forEach(t => {
    const key = `${t.athleteId}-${t.date}`;
    sessions.set(key, t);
  });
  
  athletes.forEach(athlete => {
    if (athlete.status === "Lesionado") return;
    
    // Get last 25 training sessions
    const sessions = trainingData
      .filter(t => t.athleteId === athlete.id)
      .slice(-25);
    
    sessions.forEach(s => {
      const isMatch = s.isMatchDay;
      const intensityMult = isMatch ? 1.3 : (s.pse >= 7 ? 1.15 : 0.85);
      
      // Position-based GPS profiles
      const profile = {
        GK:  { dist: 4500, hsr: 80,  sprints: 3,  topSpeed: 26 },
        CB:  { dist: 9500, hsr: 280, sprints: 12, topSpeed: 31 },
        RB:  { dist: 11000,hsr: 480, sprints: 22, topSpeed: 33 },
        LB:  { dist: 11000,hsr: 480, sprints: 22, topSpeed: 33 },
        CDM: { dist: 10500,hsr: 350, sprints: 14, topSpeed: 30 },
        CM:  { dist: 11500,hsr: 420, sprints: 18, topSpeed: 31 },
        CAM: { dist: 11000,hsr: 500, sprints: 20, topSpeed: 32 },
        RW:  { dist: 10500,hsr: 600, sprints: 28, topSpeed: 34 },
        LW:  { dist: 10500,hsr: 600, sprints: 28, topSpeed: 34 },
        ST:  { dist: 9500, hsr: 520, sprints: 24, topSpeed: 33 }
      }[athlete.position];
      
      const dist = profile.dist * intensityMult * randBetween(0.85, 1.15);
      const hsr = profile.hsr * intensityMult * randBetween(0.7, 1.3);
      const sprints = Math.max(0, Math.round(profile.sprints * intensityMult * randBetween(0.7, 1.3)));
      const topSpeed = Math.max(20, profile.topSpeed * randBetween(0.92, 1.05));
      const playerLoad = (dist / 1000) * 12 * intensityMult * randBetween(0.9, 1.1);
      const accels = Math.round(20 + sprints * 2 * randBetween(0.8, 1.2));
      const decels = Math.round(18 + sprints * 1.8 * randBetween(0.8, 1.2));
      const hmld = hsr * randBetween(1.4, 1.8); // High Metabolic Load Distance
      
      gpsData.push({
        athleteId: athlete.id,
        athleteName: athlete.name,
        athleteNick: athlete.nick,
        position: athlete.position,
        date: s.date,
        dateObj: s.dateObj,
        sessionType: isMatch ? "Jogo" : "Treino",
        duration: s.duration,
        // Distance metrics
        totalDistance: Math.round(dist),
        distanceMin: +(dist / s.duration).toFixed(1),
        // Speed zones (m)
        zone1: Math.round(dist * 0.45), // walk
        zone2: Math.round(dist * 0.30), // jog
        zone3: Math.round(dist * 0.15), // run
        zone4: Math.round(dist * 0.07), // high-speed run
        zone5: Math.round(dist * 0.03), // sprint
        // Performance
        hsr: Math.round(hsr),
        sprintDistance: Math.round(hsr * 0.4),
        sprintCount: sprints,
        topSpeed: +topSpeed.toFixed(1),
        avgSpeed: +(dist / 1000 / (s.duration/60)).toFixed(1),
        playerLoad: +playerLoad.toFixed(1),
        hmld: Math.round(hmld),
        // Accels/decels
        accelerations: accels,
        decelerations: decels,
        maxAccel: +randBetween(3.5, 4.8).toFixed(1),
        maxDecel: +(-randBetween(3.5, 5.2)).toFixed(1),
        // Heart rate
        avgHR: Math.round(140 + intensityMult * 20 + randBetween(-10, 10)),
        maxHR: Math.round(180 + randBetween(-5, 15)),
        device: "StatSports"
      });
    });
  });
  
  return gpsData;
}

// Generate anthropometry — 6 measurements per athlete spread across 6 months
function generateAnthropometry(athletes) {
  const data = [];
  const today = new Date();
  
  athletes.forEach(athlete => {
    let weight = athlete.weight;
    let bf = randBetween(8, 14); // body fat baseline for athletes
    
    for (let m = 6; m >= 0; m--) {
      const date = new Date(today);
      date.setMonth(date.getMonth() - m);
      
      // Slight progression
      weight += randBetween(-0.3, 0.3);
      bf += randBetween(-0.4, 0.3);
      bf = Math.max(6, Math.min(18, bf));
      
      const muscleMass = weight * (0.45 + (1 - bf/100) * 0.05);
      
      data.push({
        athleteId: athlete.id,
        athleteName: athlete.name,
        athleteNick: athlete.nick,
        date: date.toISOString().split('T')[0],
        dateObj: date,
        weight: +weight.toFixed(1),
        height: athlete.height,
        bodyFat: +bf.toFixed(1),
        muscleMass: +muscleMass.toFixed(1),
        bmi: +(weight / Math.pow(athlete.height/100, 2)).toFixed(1),
        // Skinfolds
        skinfoldTriceps: +randBetween(6, 12).toFixed(1),
        skinfoldSubscapular: +randBetween(7, 13).toFixed(1),
        skinfoldSuprailiac: +randBetween(8, 16).toFixed(1),
        skinfoldThigh: +randBetween(8, 14).toFixed(1),
        skinfoldAbdominal: +randBetween(9, 18).toFixed(1),
        skinfoldChest: +randBetween(5, 10).toFixed(1),
        skinfoldAxillary: +randBetween(7, 12).toFixed(1),
        // Circumferences (cm)
        circArm: +randBetween(30, 36).toFixed(1),
        circChest: +randBetween(95, 105).toFixed(1),
        circWaist: +randBetween(75, 85).toFixed(1),
        circHip: +randBetween(92, 102).toFixed(1),
        circThigh: +randBetween(55, 62).toFixed(1),
        circCalf: +randBetween(36, 42).toFixed(1)
      });
    }
  });
  
  return data;
}

// Generate injury history
function generateInjuries(athletes) {
  const injuries = [];
  const today = new Date();
  
  const injuryTypes = ["Muscular", "Ligamentar", "Óssea", "Tendinosa", "Articular"];
  const regions = ["Coxa D.", "Coxa E.", "Joelho D.", "Joelho E.", "Tornozelo D.", "Tornozelo E.", 
                   "Panturrilha D.", "Panturrilha E.", "Lombar", "Adutor D.", "Adutor E.", "Isquiotibial D.", "Isquiotibial E."];
  const severity = ["Leve", "Moderada", "Grave"];
  const mechanisms = ["Sprint", "Mudança de direção", "Choque", "Salto/Aterrissagem", "Treino", "Sem contato"];
  
  athletes.forEach((athlete, idx) => {
    // 0-3 injuries per athlete (some have more)
    const injuryCount = athlete.status === "Lesionado" ? randInt(1, 3) : randInt(0, 2);
    
    for (let i = 0; i < injuryCount; i++) {
      const daysAgo = randInt(5, 365);
      const date = new Date(today);
      date.setDate(date.getDate() - daysAgo);
      
      const sev = pick(severity);
      const recoveryDays = sev === "Leve" ? randInt(3, 14) : (sev === "Moderada" ? randInt(15, 35) : randInt(36, 90));
      const isCurrent = athlete.status === "Lesionado" && i === 0;
      
      const returnDate = new Date(date);
      returnDate.setDate(returnDate.getDate() + recoveryDays);
      
      injuries.push({
        id: `INJ${String(injuries.length + 1).padStart(4,'0')}`,
        athleteId: athlete.id,
        athleteName: athlete.name,
        athleteNick: athlete.nick,
        position: athlete.position,
        type: pick(injuryTypes),
        region: pick(regions),
        severity: sev,
        mechanism: pick(mechanisms),
        date: date.toISOString().split('T')[0],
        dateObj: date,
        recoveryDays,
        expectedReturn: returnDate.toISOString().split('T')[0],
        diagnosis: `${pick(injuryTypes)} grau ${sev === "Leve" ? "I" : sev === "Moderada" ? "II" : "III"} em ${pick(regions).toLowerCase()}`,
        treatment: pick(["Fisioterapia + Repouso", "Cirurgia + Reabilitação", "Tratamento conservador", "Crioterapia + Fisio", "Imobilização + Fisio"]),
        status: isCurrent ? "Ativo" : "Recuperado",
        notes: ""
      });
    }
  });
  
  return injuries.sort((a,b) => b.dateObj - a.dateObj);
}

// ── Fetch a sheet tab by name ──────────────────────────────────
async function fetchSheet(spreadsheetId, apiKey, sheetName) {
  const range = encodeURIComponent(`${sheetName}!A1:ZZ`);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${range}?key=${apiKey}`;
  const res = await fetch(url);
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || `Erro ao ler aba "${sheetName}"`);
  }
  const data = await res.json();
  return data.values || [];
}

// ── Convert rows → objects using first row as headers ──────────
function rowsToObjects(rows) {
  if (!rows || rows.length < 2) return [];
  const headers = rows[0];
  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = row[i] || ''; });
    return obj;
  });
}

// ── Shared date helpers ────────────────────────────────────────
// Normaliza qualquer formato (DD/MM/YYYY, MM/DD/YYYY, YYYY-MM-DD, com ou sem hora) → 'YYYY-MM-DD'
function normalizeDateStr(raw) {
  if (!raw) return '';
  const s = String(raw).trim();
  // Formato ISO: YYYY-MM-DD ou YYYY-MM-DDThh:mm
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
  // Formato com barras: D/M/YYYY ou DD/MM/YYYY ou M/D/YYYY (StatSports)
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) {
    const a = parseInt(m[1]), b = parseInt(m[2]), year = m[3];
    // Se o segundo campo > 12 é formato M/D/YYYY americano (StatSports)
    if (b > 12) return `${year}-${String(a).padStart(2,'0')}-${String(b).padStart(2,'0')}`;
    // Caso contrário assume DD/MM/YYYY (formato brasileiro padrão)
    return `${year}-${String(b).padStart(2,'0')}-${String(a).padStart(2,'0')}`;
  }
  // Fallback: parse nativo
  const d = new Date(s);
  if (!isNaN(d)) return d.toISOString().slice(0, 10);
  return '';
}

// Cria objeto Date (meio-dia para evitar problemas de fuso) a partir de string normalizada
function toDateObj(dateStr) {
  const norm = normalizeDateStr(dateStr);
  if (!norm) return new Date(0); // época — fica fora de qualquer janela recente
  return new Date(norm + 'T12:00:00');
}

// Diferença em dias de CALENDÁRIO entre hoje e a data (0 = hoje, 1 = ontem...)
function daysAgoCal(dateObj) {
  if (!dateObj || isNaN(dateObj)) return Infinity;
  const today = new Date(); today.setHours(12,0,0,0);
  const d = new Date(dateObj); d.setHours(12,0,0,0);
  return Math.round((today - d) / 86400000);
}

// ── SHA-256 no browser (Web Crypto API) ──────────────────────
async function sha256(texto) {
  const encoder = new TextEncoder();
  const data = encoder.encode(texto);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// ── Autenticação: buscar e validar utilizador na aba _Usuarios ─
async function autenticarUtilizador(spreadsheetId, apiKey, email, senha) {
  try {
    const rows = await fetchSheet(spreadsheetId, apiKey, '_Usuarios');
    if (!rows || rows.length < 2) {
      return { sucesso: false, erro: 'Aba _Usuarios não encontrada ou sem utilizadores. Verifique a instalação do script.' };
    }
    const users = rowsToObjects(rows);
    const user = users.find(u =>
      (u['Email'] || '').toLowerCase().trim() === email.toLowerCase().trim()
      && (u['Status'] || '') === 'Ativo'
    );
    if (!user) {
      return { sucesso: false, erro: 'Email não encontrado ou utilizador inactivo.' };
    }
    const hashDigitado = await sha256(senha);
    const hashGuardado = (user['Senha_Hash'] || '').trim();
    if (hashDigitado !== hashGuardado) {
      return { sucesso: false, erro: 'Senha incorrecta.' };
    }
    return {
      sucesso: true,
      user: {
        name:   user['Nome']  || 'Utilizador',
        email:  user['Email'] || '',
        role:   user['Cargo'] || 'Utilizador',
        avatar: (user['Nome'] || 'UT').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2)
      }
    };
  } catch (e) {
    return { sucesso: false, erro: 'Erro ao verificar credenciais: ' + e.message };
  }
}

// Verifica se uma data está dentro do período seleccionado.
// period === 1 significa "apenas hoje"; caso contrário, últimos N dias.
function dentroPeriodo(dateObj, period) {
  const ago = daysAgoCal(dateObj);
  if (period === 1) return ago === 0;       // HOJE
  return ago >= 0 && ago < period;          // últimos N dias (inclui hoje)
}

// ═══════════════════════════════════════════════════════════════
// ANÁLISE: ACWR + ESTADO DIÁRIO DO ATLETA
// ═══════════════════════════════════════════════════════════════

// Calcula ACWR (Acute:Chronic Workload Ratio) para um atleta.
// Prioridade da fonte de carga:
//   1. GPS do dia presente → fonte 'GPS' (com flag gpsHoje=true)
//   2. Histórico GPS disponível → fonte 'GPS'
//   3. Sem GPS → carga interna (PSE × duração) → fonte 'Carga Interna'
// Aguda = soma últimos 7 dias. Crónica = média semanal dos últimos 28 dias.
function calcularACWR(athleteId, gpsData, trainingData) {
  const gpsAth = (gpsData || []).filter(g => g.athleteId === athleteId);
  const trainAth = (trainingData || []).filter(t => t.athleteId === athleteId);

  const temGPSHistorico = gpsAth.some(g => (g.playerLoad > 0 || g.totalDistance > 0));
  const temGPSHoje = gpsAth.some(g => daysAgoCal(g.dateObj) === 0 && (g.playerLoad > 0 || g.totalDistance > 0));

  // Escolher fonte de carga por registo
  let fonte, registos;
  if (temGPSHistorico) {
    fonte = 'GPS';
    // Carga GPS: usa playerLoad se existir, senão distância/100 como proxy
    registos = gpsAth.map(g => ({
      dateObj: g.dateObj,
      carga: g.playerLoad > 0 ? g.playerLoad : (g.totalDistance / 100)
    }));
  } else {
    fonte = 'Carga Interna';
    registos = trainAth
      .filter(t => t.internalLoad > 0)
      .map(t => ({ dateObj: t.dateObj, carga: t.internalLoad }));
  }

  if (registos.length === 0) {
    return { acwr: 0, fonte: '—', gpsHoje: false, semDados: true };
  }

  // Aguda: soma 7 dias. Crónica: soma 28 dias ÷ 4 (média semanal).
  let aguda = 0, cronica28 = 0;
  registos.forEach(r => {
    const ago = daysAgoCal(r.dateObj);
    if (ago >= 0 && ago < 7)  aguda += r.carga;
    if (ago >= 0 && ago < 28) cronica28 += r.carga;
  });
  const cronicaSemanal = cronica28 / 4;
  const acwr = cronicaSemanal > 0 ? +(aguda / cronicaSemanal).toFixed(2) : 0;

  return { acwr, fonte, gpsHoje: temGPSHoje, semDados: false };
}

// Classifica zona de risco do ACWR (sweet spot 0.8–1.3)
function zonaACWR(acwr) {
  if (!acwr || acwr === 0) return { label: tUI('acwr.noData'),    cor: 'var(--text-tertiary)',    nivel: 'none' };
  if (acwr < 0.8)  return  { label: tUI('acwr.underload'),       cor: 'var(--accent-secondary)', nivel: 'baixo' };
  if (acwr <= 1.3) return  { label: tUI('acwr.ideal'),           cor: 'var(--accent-success)',   nivel: 'baixo' };
  if (acwr <= 1.5) return  { label: tUI('acwr.attention'),       cor: 'var(--accent-warning)',   nivel: 'medio' };
  return                   { label: tUI('acwr.highRisk'),        cor: 'var(--accent-danger)',    nivel: 'alto' };
}

// Estado diário consolidado de um atleta (bem-estar/PSE/dores do dia + risco)
function estadoDiarioAtleta(athlete, trainingData, gpsData, injuries) {
  const trainAth = (trainingData || []).filter(t => t.athleteId === athlete.id);

  // Registo de HOJE (se existir)
  const hojePre  = trainAth.find(t => daysAgoCal(t.dateObj) === 0 && t.hasPre);
  const hojePost = trainAth.find(t => daysAgoCal(t.dateObj) === 0 && t.hasPost);
  // Se não houver flags (dados demo), usa o registo de hoje qualquer
  const hojeAny  = trainAth.find(t => daysAgoCal(t.dateObj) === 0);

  const bemEstar = hojePre?.wellness ?? (hojeAny?.wellness > 0 ? hojeAny.wellness : null);
  const pse      = hojePost?.pse ?? (hojeAny?.pse > 0 ? hojeAny.pse : null);

  // Dores: regiões reportadas hoje
  const doresRegioes = (hojePre?.painRegions || hojeAny?.painRegions || []).filter(Boolean);
  const temDores = doresRegioes.length > 0;

  // ACWR
  const acwrInfo = calcularACWR(athlete.id, gpsData, trainingData);
  const zona = zonaACWR(acwrInfo.acwr);

  // Lesões activas
  const lesoesAtivas = (injuries || []).filter(i =>
    i.athleteId === athlete.id && i.status && i.status.toLowerCase().indexOf('alta') === -1
  );

  // Nível de risco combinado: ACWR + bem-estar + dores + lesão
  let pontosRisco = 0;
  if (zona.nivel === 'alto')  pontosRisco += 3;
  if (zona.nivel === 'medio') pontosRisco += 2;
  if (bemEstar !== null && bemEstar < 2.5) pontosRisco += 2;
  else if (bemEstar !== null && bemEstar < 3.2) pontosRisco += 1;
  if (temDores) pontosRisco += 2;
  if (lesoesAtivas.length > 0) pontosRisco += 3;

  let risco;
  if (pontosRisco >= 4)      risco = { nivel: 'alto',  cor: 'var(--accent-danger)',  label: tUI('athleteCard.highRisk') };
  else if (pontosRisco >= 2) risco = { nivel: 'medio', cor: 'var(--accent-warning)', label: tUI('athleteCard.medRisk')  };
  else                       risco = { nivel: 'baixo', cor: 'var(--accent-success)', label: tUI('athleteCard.lowRisk')  };

  // Estado de disponibilidade derivado
  let disponibilidade;
  if (lesoesAtivas.length > 0) disponibilidade = { status: tUI('overview.injured'),    cor: 'var(--accent-danger)',  dot: '🔴' };
  else if (risco.nivel === 'alto' || temDores)   disponibilidade = { status: tUI('overview.conditioned'), cor: 'var(--accent-warning)', dot: '🟡' };
  else                                           disponibilidade = { status: tUI('overview.available'),   cor: 'var(--accent-success)', dot: '🟢' };

  return {
    bemEstar, pse, temDores, doresRegioes,
    acwr: acwrInfo.acwr, acwrFonte: acwrInfo.fonte, gpsHoje: acwrInfo.gpsHoje,
    zona, risco, disponibilidade,
    lesoesAtivas: lesoesAtivas.length,
    respondeuBemEstar: bemEstar !== null,
    respondeuPSE: pse !== null
  };
}

// ═══════════════════════════════════════════════════════════════
// NOTIFICAÇÕES — detecção de novos registos com agrupamento
// ═══════════════════════════════════════════════════════════════
const NOTIF_SNAPSHOT_KEY = 'bsp_notif_snapshot';
const NOTIF_READ_KEY = 'bsp_notif_read';

// Gera notificações comparando contagens actuais com o último snapshot guardado.
// Agrupa bem-estar e PSE ("12 novas respostas de bem-estar").
function gerarNotificacoes(data) {
  if (!data) return [];
  const { athletes = [], trainingData = [], gpsData = [], anthroData = [], injuries = [] } = data;

  // Contagens actuais por tipo
  const atual = {
    atletas: athletes.length,
    bemEstar: trainingData.filter(t => t.hasPre || t.wellness > 0).length,
    pse: trainingData.filter(t => t.hasPost || t.pse > 0).length,
    gps: gpsData.length,
    antro: anthroData.length,
    lesoes: injuries.length,
    // retornos = lesões com alta médica
    retornos: injuries.filter(i => i.status && i.status.toLowerCase().indexOf('alta') !== -1).length
  };

  // Ler snapshot anterior
  let anterior = null;
  try { anterior = JSON.parse(localStorage.getItem(NOTIF_SNAPSHOT_KEY)); } catch {}

  const notifs = [];
  const agora = new Date().toISOString();

  if (anterior) {
    const novoBem   = atual.bemEstar - (anterior.bemEstar || 0);
    const novoPSE   = atual.pse      - (anterior.pse || 0);
    const novoGPS   = atual.gps      - (anterior.gps || 0);
    const novoAntro = atual.antro    - (anterior.antro || 0);
    const novaLesao = atual.lesoes   - (anterior.lesoes || 0);
    const novoAtl   = atual.atletas  - (anterior.atletas || 0);
    const novoRet   = atual.retornos - (anterior.retornos || 0);

    if (novoAtl > 0)   notifs.push({ id:'atl', icon:'UserPlus', type:'info', page:'athletes', text: novoAtl === 1 ? 'Novo atleta cadastrado' : `${novoAtl} novos atletas cadastrados`, ts: agora });
    if (novoBem > 0)   notifs.push({ id:'bem', icon:'Smile', type:'success', page:'training', text: novoBem === 1 ? 'Nova resposta de bem-estar' : `${novoBem} novas respostas de bem-estar`, ts: agora });
    if (novoPSE > 0)   notifs.push({ id:'pse', icon:'Activity', type:'success', page:'training', text: novoPSE === 1 ? 'Nova resposta de PSE' : `${novoPSE} novas respostas de PSE`, ts: agora });
    if (novoGPS > 0)   notifs.push({ id:'gps', icon:'MapPin', type:'info', page:'gps', text: novoGPS === 1 ? 'Novo registo GPS' : `${novoGPS} novos registos GPS`, ts: agora });
    if (novoAntro > 0) notifs.push({ id:'antro', icon:'Ruler', type:'info', page:'anthro', text: novoAntro === 1 ? 'Nova avaliação antropométrica' : `${novoAntro} novas avaliações antropométricas`, ts: agora });
    if (novaLesao > 0) notifs.push({ id:'les', icon:'Heart', type:'warning', page:'injuries', text: novaLesao === 1 ? 'Nova lesão registada' : `${novaLesao} novas lesões registadas`, ts: agora });
    if (novoRet > 0)   notifs.push({ id:'ret', icon:'CheckCircle', type:'success', page:'injuries', text: novoRet === 1 ? 'Atleta retornou ao treino' : `${novoRet} atletas retornaram ao treino`, ts: agora });
  }

  // Notificações persistentes de estado — controladas por data de dismissal
  const lesionadosAtivos = injuries.filter(i => i.status && i.status.toLowerCase().indexOf('alta') === -1).length;
  if (lesionadosAtivos > 0) {
    // Só mostrar se não foi dispensada hoje
    const hojeStr = new Date().toISOString().slice(0,10);
    let dismissedOn = '';
    try { dismissedOn = localStorage.getItem('bsp_notif_lesativas_dismissed') || ''; } catch {}
    if (dismissedOn !== hojeStr) {
      notifs.push({ id:'lesativas', icon:'AlertTriangle', type:'warning', page:'injuries', text:`${lesionadosAtivos} ${lesionadosAtivos === 1 ? 'atleta em recuperação' : 'atletas em recuperação'}`, ts: agora, persistente:true });
    }
  }

  return notifs;
}

// Atualiza o snapshot de contagens (chamar após mostrar/processar notificações)
function atualizarSnapshotNotif(data) {
  if (!data) return;
  const { athletes = [], trainingData = [], gpsData = [], anthroData = [], injuries = [] } = data;
  const snap = {
    atletas: athletes.length,
    bemEstar: trainingData.filter(t => t.hasPre || t.wellness > 0).length,
    pse: trainingData.filter(t => t.hasPost || t.pse > 0).length,
    gps: gpsData.length,
    antro: anthroData.length,
    lesoes: injuries.length,
    retornos: injuries.filter(i => i.status && i.status.toLowerCase().indexOf('alta') !== -1).length
  };
  try { localStorage.setItem(NOTIF_SNAPSHOT_KEY, JSON.stringify(snap)); } catch {}
}

// Backwards-compat: static alias (used in buscarGlobal and renders)
const SEARCHABLE_PAGES = getSearchablePages();

// Remove acentos para busca tolerante
function semAcentos(s) {
  return (s || '').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// Pesquisa global: devolve { athletes:[...], pages:[...] }
function buscarGlobal(query, athletes) {
  const q = semAcentos(query).trim();
  if (q.length < 1) return { athletes: [], pages: [] };

  const atletasEncontrados = (athletes || []).filter(a => {
    return semAcentos(a.name).includes(q)
        || semAcentos(a.nick).includes(q)
        || semAcentos(a.positionLabel).includes(q)
        || semAcentos(a.position).includes(q);
  }).slice(0, 6);

  const paginasEncontradas = getSearchablePages().filter(p => {
    return semAcentos(p.label).includes(q)
        || p.keywords.some(k => semAcentos(k).includes(q));
  }).slice(0, 5);

  return { athletes: atletasEncontrados, pages: paginasEncontradas };
}

// ── Parse athletes from 1_Cadastro_Atleta (i18n-aware) ────────
function parseAthletes(rows) {
  if (!rows || rows.length < 2) return [];
  const headers = rows[0];
  const dataRows = rows.slice(1);
  const posGroups = getPosGroups();

  return dataRows
    .filter(r => getVal(r, headers, 'fullName') || getVal(r, headers, 'nickname'))
    .map((r, i) => {
      const posRaw = getVal(r, headers, 'primaryPos');
      const posCode = normalizeValue(posRaw);
      // posCode may be 'GK','RB'... (from VALUE_NORMALIZE) or the raw string
      const pos = posCode && posCode.length <= 4 && posCode === posCode.toUpperCase() ? posCode : 'CM';
      const h = parseFloat(getVal(r, headers, 'height')) || 175;
      const w = parseFloat(getVal(r, headers, 'weight')) || 75;
      const idRaw = getVal(r, headers, 'athleteId');
      const id = idRaw || `ATL${String(i+1).padStart(3,'0')}`;
      const birthStr = normalizeDateStr(getVal(r, headers, 'birthDate'));
      const age = birthStr ? Math.floor((Date.now() - new Date(birthStr + 'T12:00:00')) / 31557600000) : null;
      const footRaw = normalizeValue(getVal(r, headers, 'dominantFoot'));
      const statusRaw = normalizeValue(getVal(r, headers, 'status'));
      const fullName = getVal(r, headers, 'fullName');
      const nick = getVal(r, headers, 'nickname');
      return {
        id,
        name: fullName || nick || `Atleta ${i+1}`,
        nick: nick || fullName?.split(' ')[0] || `ATL${i+1}`,
        number: parseInt(getVal(r, headers, 'jerseyNumber')) || (i+1),
        position: pos,
        positionLabel: posGroups[pos] || pos,
        age,
        birthDate: birthStr,
        foot: footRaw === 'left' ? 'left' : 'right',
        height: h,
        weight: w,
        bmi: +(w / Math.pow(h/100, 2)).toFixed(1),
        status: statusRaw === 'ACTIVE' ? 'Ativo' : statusRaw === 'INJURED' ? 'Lesionado' :
                statusRaw === 'LOAN'   ? 'Emprestado' : statusRaw === 'INACTIVE' ? 'Inativo' :
                getVal(r, headers, 'status') || 'Ativo',
        nationality: getVal(r, headers, 'nationality') || 'Brasileira',
        contractEnd:  getVal(r, headers, 'contractEnd')  || '',
        phone:        getVal(r, headers, 'phone')        || '',
        avatar: (nick || fullName || 'AT').substring(0,2).toUpperCase(),
        joinedAt: getVal(r, headers, 'contractStart') || '',
        email:    getVal(r, headers, 'email')         || ''
      };
    });
}

// ── Parse pre-training (wellness) from 2A_PreTreino_Atleta (i18n-aware) ───
function parseWellness(rows, athletes) {
  const byName = {};
  athletes.forEach(a => {
    if (a.nick) byName[a.nick] = a;
    if (a.name) byName[a.name] = a;
  });

  if (!rows || rows.length < 2) return [];
  const headers = rows[0];
  return rows.slice(1).map(r => {
    const name   = getVal(r, headers, 'athleteName') || '';
    const ath    = byName[name] || null;
    const sono   = parseInt(getVal(r, headers, 'sleepQuality'))  || 3;
    const fadiga = parseInt(getVal(r, headers, 'fatigue'))       || 3;
    const humor  = parseInt(getVal(r, headers, 'mood'))          || 3;
    const motiv  = parseInt(getVal(r, headers, 'motivation'))    || 3;
    const wellness = +((sono + fadiga + humor + motiv) / 4).toFixed(1);
    const tsRaw  = getVal(r, headers, 'timestamp');
    const date   = normalizeDateStr(tsRaw);
    return {
      athleteId:   ath?.id   || '',
      athleteName: ath?.name || name,
      athleteNick: ath?.nick || name,
      position:    ath?.position || 'CM',
      date,
      dateObj:     toDateObj(date),
      sono, fadiga, humor, stress: 3, dorMuscular: 3,
      wellness, painRegions: [], type: 'pre'
    };
  }).filter(r => r.athleteId);
}

// ── Parse post-training from 3_PosTreino_Atleta (i18n-aware) ──
function parsePostTraining(rows, athletes) {
  if (!rows || rows.length < 2) return [];
  const headers = rows[0];
  const byName = {};
  athletes.forEach(a => {
    if (a.nick) byName[a.nick] = a;
    if (a.name) byName[a.name] = a;
  });

  return rows.slice(1).map(r => {
    const name     = getVal(r, headers, 'athleteName') || '';
    const ath      = byName[name] || null;
    const pse      = parseInt(getVal(r, headers, 'pse')) || 5;
    const duration = parseInt(getVal(r, headers, 'duration')) || 90;
    const date     = normalizeDateStr(getVal(r, headers, 'timestamp'));
    return {
      athleteId:    ath?.id       || '',
      athleteName:  ath?.name     || name,
      athleteNick:  ath?.nick     || name,
      position:     ath?.position || 'CM',
      date,
      dateObj:      toDateObj(date),
      pse, duration,
      internalLoad: pse * duration,
      peso:         parseFloat(getVal(r, headers, 'postWeight')) || 0,
      type:         'Treino',
      isMatchDay:   false
    };
  }).filter(r => r.athleteId);
}

// ── Parse GPS from 5_GPS ──────────────────────────────────────
function parseGPS(rows, athletes) {
  const objs = rowsToObjects(rows);
  // Helper: parse numérico tolerante a vírgula decimal (StatSports exporta "88,09")
  const pNum = (v) => {
    if (v === undefined || v === null || v === '') return 0;
    const n = parseFloat(String(v).replace(',', '.'));
    return isNaN(n) ? 0 : n;
  };
  // Mapa por ID (principal) + nome/apelido (fallback)
  const byId   = {};
  const byName = {};
  athletes.forEach(a => {
    if (a.id)   byId[a.id]     = a;
    if (a.nick) byName[a.nick] = a;
    if (a.name) byName[a.name] = a;
  });
  return objs
    .filter(r => r['ID_Atleta'] && r['ID_Atleta'] !== 'SEM_CADASTRO')
    .map(r => {
      const id   = r['ID_Atleta'] || '';
      const name = r['Nome_Atleta'] || '';
      // Match por ID primeiro, fallback por nome
      const ath  = byId[id] || byName[name] || null;
      const date = normalizeDateStr(r['Data']);
      return {
        athleteId:    id,
        athleteName:  ath?.name  || name,
        athleteNick:  ath?.nick  || name,
        position:     ath?.position || 'CM',
        date,
        dateObj:      toDateObj(date),
        sessionType:  r['Tipo_Sessao'] || 'Treino',
        duration:     pNum(r['Duracao_min']),
        totalDistance:pNum(r['Distancia_total_m']),
        distanceMin:  pNum(r['Distancia_por_min']),
        hsr:          pNum(r['Dist_Alta_Intensidade_m']),
        sprintDistance:pNum(r['Sprint_Distance_m']),
        sprintCount:  pNum(r['Sprints']),
        topSpeed:     pNum(r['Vel_Maxima_kmh']),
        avgSpeed:     pNum(r['Vel_Media_kmh']),
        playerLoad:   pNum(r['Dynamic_Stress_Load']),
        hmld:         pNum(r['HML_Distance_m']),
        accelerations:pNum(r['Aceleracoes']),
        decelerations:pNum(r['Desaceleracoes']),
        maxAccel:     pNum(r['Max_Aceleracao']),
        maxDecel:     pNum(r['Max_Desaceleracao']),
        avgHR:        pNum(r['FC_Media']),
        maxHR:        pNum(r['FC_Maxima']),
        zone1: 0, zone2: 0,
        zone3:        pNum(r['Zona_14_m']),
        zone4:        pNum(r['Zona_19_m']),
        zone5:        pNum(r['Zona_25_m']),
        device:       r['Dispositivo'] || 'StatSports'
      };
    });
}

// ── Parse anthropometry from 4_Antropometria (i18n-aware) ─────
function parseAnthro(rows, athletes) {
  if (!rows || rows.length < 2) return [];
  const headers = rows[0];
  const byName = {};
  athletes.forEach(a => {
    if (a.nick) byName[a.nick] = a;
    if (a.name) byName[a.name] = a;
  });
  return rows.slice(1).map(r => {
    const name = getVal(r, headers, 'anthroName') || '';
    const ath  = byName[name] || null;
    const w  = parseFloat(getVal(r, headers, 'weight'))    || 0;
    const h  = parseFloat(getVal(r, headers, 'height'))    || 0;
    const bf = parseFloat(getVal(r, headers, 'bodyFat'))   || 0;
    const dateRaw = getVal(r, headers, 'assessmentDate') || getVal(r, headers, 'timestamp');
    const date = normalizeDateStr(dateRaw);
    return {
      athleteId:   ath?.id || '',
      athleteName: ath?.name || name,
      athleteNick: ath?.nick || name,
      date,
      dateObj:     toDateObj(date),

      muscleMass:  parseFloat(getVal(r, headers, 'muscleMass')) || 0,

      waist: parseFloat(getVal(r, headers, 'waist'))   || 0,
      hip:   parseFloat(getVal(r, headers, 'hip'))     || 0,
      thigh: parseFloat(getVal(r, headers, 'thigh'))   || 0,
      calf:  parseFloat(getVal(r, headers, 'calf'))    || 0,
      arm:   parseFloat(getVal(r, headers, 'armRelax'))|| 0
    };
  }).filter(r => r.athleteId);
}

// ── Parse injuries from 5_Lesoes ──────────────────────────────
function parseInjuries(rows, athletes) {
  const byName = {};
  athletes.forEach(a => {
    if (a.nick) byName[a.nick] = a;
    if (a.name) byName[a.name] = a;
  });
  if (!rows || rows.length < 2) return [];
  const headers = rows[0];
  const gravMap = {
    'MILD': 'Leve', 'MODERATE': 'Moderada', 'SEVERE': 'Grave', 'VERY_SEVERE': 'Grave'
  };
  return rows.slice(1).map(r => {
    const name = getVal(r, headers, 'injuryName') || '';
    const ath  = byName[name] || null;
    const dateRaw    = getVal(r, headers, 'injuryRegDate') || getVal(r, headers, 'timestamp');
    const date       = normalizeDateStr(dateRaw);
    const injuryDate = normalizeDateStr(getVal(r, headers, 'injuryDate'));
    const returnDate = normalizeDateStr(getVal(r, headers, 'returnDate'));
    let daysOut = 0;
    if (injuryDate) {
      const end = returnDate ? new Date(returnDate) : new Date();
      daysOut = Math.max(0, Math.round((end - new Date(injuryDate)) / 86400000));
    }
    const sevCode = normalizeValue(getVal(r, headers, 'severity'));
    return {
      athleteId:   ath?.id || '',
      athleteName: ath?.name || name,
      athleteNick: ath?.nick || name,
      date,
      dateObj:     toDateObj(date),
      injuryDate,
      returnDate,
      type:      getVal(r, headers, 'injuryType')    || 'Muscular',
      location:  getVal(r, headers, 'injuryLocation')|| '',
      severity:  gravMap[sevCode] || sevCode || 'Leve',
      mechanism: getVal(r, headers, 'mechanism')     || '',
      diagnosis: getVal(r, headers, 'diagnosis')     || '',
      treatment: getVal(r, headers, 'treatment')     || '',
      status:    getVal(r, headers, 'injuryStatus')  || 'Em tratamento',
      daysOut, recoveryDays: daysOut
    };
  }).filter(r => r.athleteId);
}

// ── Master fetch — loads all sheets (i18n-aware tab detection) ─
async function fetchAllData(spreadsheetId, apiKey) {
  // Detect real tab names from spreadsheet metadata; fall back to pt-BR defaults
  const abas = await detectarAbas(spreadsheetId, apiKey);
  const tabCadastro  = (abas && abas.cadastro)  || '1_Cadastro_Atleta';
  const tabPreTreino = (abas && abas.preTreino)  || '2A_PreTreino_Atleta';
  const tabPosTreino = (abas && abas.posTreino)  || '3_PosTreino_Atleta';
  const tabGPS       = (abas && abas.gps)        || '5_GPS';
  const tabAntro     = (abas && abas.antro)      || '4_Antropometria';
  const tabLesoes    = (abas && abas.lesoes)      || '5_Lesoes';

  const SHEETS = [tabCadastro, tabPreTreino, tabPosTreino, tabGPS, tabAntro, tabLesoes];

  const fetchResults = await Promise.allSettled(
    SHEETS.map(s => fetchSheet(spreadsheetId, apiKey, s))
  );

  const [cadRows, preRows, posRows, gpsRows, anthRows, lesRows] = fetchResults.map(r =>
    r.status === 'fulfilled' ? r.value : []
  );

  const athletes = parseAthletes(cadRows);
  if (athletes.length === 0) throw new Error('Nenhum atleta encontrado. Verifique se a aba de cadastro tem dados.');

  const wellness   = parseWellness(preRows, athletes);
  const postTrain  = parsePostTraining(posRows, athletes);
  const gps        = parseGPS(gpsRows, athletes);
  const anthro     = parseAnthro(anthRows, athletes);
  const injuries   = parseInjuries(lesRows, athletes);

  // Merge pre+post — inclui registos de ambos mesmo sem correspondência
  const allDates = new Set([
    ...wellness.map(w => `${w.athleteId}__${w.date}`),
    ...postTrain.map(p => `${p.athleteId}__${p.date}`)
  ]);

  const trainingData = Array.from(allDates).map(key => {
    const [athleteId, date] = key.split('__');
    const pre  = wellness.find(w => w.athleteId === athleteId && w.date === date);
    const post = postTrain.find(p => p.athleteId === athleteId && p.date === date);
    // Base: dados do atleta vindos de qualquer um dos dois
    const ath = athletes.find(a => a.id === athleteId) || {};
    return {
      athleteId,
      athleteName:  ath.name     || pre?.athleteName  || post?.athleteName  || '',
      athleteNick:  ath.nick     || pre?.athleteNick  || post?.athleteNick  || '',
      position:     ath.position || pre?.position     || post?.position     || 'CM',
      date,
      dateObj:      toDateObj(date),
      // Pré-treino
      sono:         pre?.sono        || 0,
      fadiga:       pre?.fadiga      || 0,
      humor:        pre?.humor       || 0,
      stress:       pre?.stress      || 0,
      dorMuscular:  pre?.dorMuscular || 0,
      wellness:     pre?.wellness    || 0,
      painRegions:  pre?.painRegions || [],
      // Pós-treino
      pse:          post?.pse          || 0,
      duration:     post?.duration     || 0,
      internalLoad: post?.internalLoad || 0,
      peso:         post?.peso         || 0,
      type:         post?.type         || 'Treino',
      isMatchDay:   post?.isMatchDay   || false,
      // Flags de presença
      hasPre:  !!pre,
      hasPost: !!post
    };
  }).sort((a, b) => a.date.localeCompare(b.date));

  return { athletes, trainingData, gpsData: gps, anthroData: anthro, injuries };
}

            width:64, height:64, borderRadius:16,
            background:'var(--accent-primary)',
            display:'inline-flex', alignItems:'center', justifyContent:'center',

            <div style={{display:'flex', gap:10}}>

        <div style={{textAlign:'center', marginTop:20, fontSize:11, color:'var(--text-quaternary)'}}>

      </div>
    </div>
  );
};

function exportTeamReportPDF(athletes, trainingData, gpsData, injuries, period = 7) {
  const w = window.open('', '_blank');
  const s = getSettings();
  const accent = s.accentColor || s.pdfColor || '#C5FF3E';
  const teamName = s.teamName || 'SistemaBSP';
  const footer = s.pdfFooter || 'SistemaBSP';
  const logo = s.pdfLogo || '';
  const today = new Date().toLocaleDateString('pt-BR');

  const periodLabel = period === 1 ? 'Hoje' : `Últimos ${period} dias`;

  // KPIs do período seleccionado
  const inPeriod = (dObj) => {
    const ago = daysAgoCal(dObj);
    if (period === 1) return ago === 0;
    return ago >= 0 && ago < period;
  };
  const trainP = (trainingData||[]).filter(t => inPeriod(t.dateObj));
  const avgPSE = trainP.filter(t=>t.pse>0).length ? (trainP.filter(t=>t.pse>0).reduce((a,t)=>a+t.pse,0)/trainP.filter(t=>t.pse>0).length).toFixed(1) : '—';
  const totalLoad = trainP.reduce((a,t)=>a+(t.internalLoad||0),0);
  const wP = trainP.filter(t=>t.wellness>0);
  const avgWell = wP.length ? (wP.reduce((a,t)=>a+t.wellness,0)/wP.length).toFixed(1) : '—';
  const ativos = (athletes||[]).filter(a=>a.status==='Ativo').length;

  // Estado de cada atleta
  const estados = (athletes||[]).map(a => ({ a, e: estadoDiarioAtleta(a, trainingData, gpsData, injuries) }));
  const lesionados = estados.filter(x => x.e.lesoesAtivas > 0);

  const statusBadge = (st) => {
    if (st === 'Disponível') return '<span class="badge badge-ok">Disponível</span>';
    if (st === 'Condicionado') return '<span class="badge badge-warn">Condicionado</span>';
    return '<span class="badge badge-bad">Lesionado</span>';
  };

  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8">
  <title>PerformFootball Pro v8.0</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    .header { display:flex; justify-content:space-between; align-items:center; border-bottom:3px solid ${accent}; padding-bottom:20px; margin-bottom:24px; }
    .brand { font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:#666; margin-bottom:4px; }
    .title { font-size:26px; font-weight:700; }
    .logo { height:48px; }
    .grid4 { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }

    .kpi-label { font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:#666; margin-bottom:4px; }
    .kpi-value { font-size:22px; font-weight:700; }
    .kpi-sub { font-size:10px; color:#999; margin-top:2px; }
    .section { margin-bottom:24px; }
    .section-title { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:#444; border-bottom:1px solid #eee; padding-bottom:6px; margin-bottom:12px; }
    table { width:100%; border-collapse:collapse; font-size:11.5px; }
    th { background:#f0f0f0; padding:7px 8px; text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:0.03em; color:#555; }
    td { padding:6px 8px; border-bottom:1px solid #f0f0f0; }
    .badge { display:inline-block; padding:2px 7px; border-radius:20px; font-size:9.5px; font-weight:600; }
    .badge-ok { background:#e8f5e9; color:#2e7d32; }

    <div class="section-title">Atletas em Recuperação (${lesionados.length})</div>

          <td>${inj.type||'—'}</td>

          <td>${inj.status||'—'}</td>
        </tr>`;
      }).join('')}
    </table>
  </div>` : ''}

  <div class="footer">
    <span>${footer}</span>
    <span>Gerado em ${today}</span>
  </div>
  </body></html>`);
  w.document.close();
  setTimeout(() => w.print(), 500);
}

const ToastContext = React.createContext();
const useToast = () => React.useContext(ToastContext);

const ToastProvider = ({ children }) => {
  const [toasts, setToasts] = useState([]);
  
  const show = useCallback((msg, type = "success") => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);
  
  return (
    <ToastContext.Provider value={{ show }}>
      {children}
      <div style={{position:'fixed', bottom:24, right:24, display:'flex', flexDirection:'column', gap:8, zIndex:300}}>
        {toasts.map(t => (
          <div key={t.id} className="toast" style={{
            position:'static',
            borderLeftColor: t.type === 'error' ? 'var(--accent-danger)' : t.type === 'warning' ? 'var(--accent-warning)' : 'var(--accent-primary)'
          }}>
            <Icon name={t.type === 'error' ? 'AlertCircle' : t.type === 'warning' ? 'AlertTriangle' : 'CheckCircle'} size={18} />
            <span>{t.msg}</span>
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
};

        </div>

        {/* Direita — login */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'80px 80px 80px 40px'}}>
          <div className="animate-fadeUp stagger-2" style={{width:'100%',maxWidth:420}}>
            <div className="card" style={{padding:40,background:'rgba(15,20,25,0.6)',backdropFilter:'blur(12px)',border:'1px solid var(--border-default)'}}>
              <div style={{marginBottom:24}}>
                <h2 className="headline" style={{fontSize:28,margin:'0 0 8px 0',fontWeight:700}}>
                  {dataMode==='real' ? 'Entrar' : 'Modo Demo'}
                </h2>
                <p style={{color:'var(--text-tertiary)',fontSize:14,margin:0}}>
                  {dataMode==='real' ? '🔒 Introduza as suas credenciais' : '👁 Dados fictícios para demonstração'}
                </p>
              </div>

              <div onKeyDown={e => e.key==='Enter' && !loading && handleEntrar()}>
                {dataMode === 'real' ? (
                  <>
                    <div style={{marginBottom:16}}>
                      <label className="label">Email</label>
                      <input
                        className="input" type="email" autoFocus
                        value={email} onChange={e=>setEmail(e.target.value)}
                        placeholder="seu@email.com"
                      />
                    </div>
                    <div style={{marginBottom:24,position:'relative'}}>
                      <label className="label">Senha</label>
                      <input
                        className="input"
                        type={showPass ? 'text' : 'password'}
                        value={senha} onChange={e=>setSenha(e.target.value)}
                        placeholder="••••••••"
                        style={{paddingRight:44}}
                      />
                      <button onClick={()=>setShowPass(!showPass)} style={{
                        position:'absolute',right:12,top:32,background:'none',border:'none',
                        cursor:'pointer',color:'var(--text-tertiary)',display:'flex',alignItems:'center'
                      }}>
                        <Icon name={showPass?'EyeOff':'Eye'} size={16}/>
                      </button>
                    </div>
                  </>
                ) : (
                  <>
                    <div style={{marginBottom:16}}>
                      <label className="label">Seu nome</label>
                      <input className="input" autoFocus value={demoNome} onChange={e=>setDemoNome(e.target.value)} placeholder="Ex: João Silva"/>
                    </div>
                    <div style={{marginBottom:24}}>
                      <label className="label">Cargo</label>
                      <select className="input" value={demoCargo} onChange={e=>setDemoCargo(e.target.value)} style={{cursor:'pointer'}}>
                        {CARGOS.map(c=><option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                  </>
                )}

                {error && (
                  <div style={{background:'rgba(255,59,92,0.1)',border:'1px solid rgba(255,59,92,0.3)',borderRadius:8,padding:'10px 14px',fontSize:13,color:'var(--accent-danger)',marginBottom:16,display:'flex',alignItems:'center',gap:8}}>
                    <Icon name="AlertCircle" size={14}/> {error}
                  </div>
                )}

                <button
                  onClick={handleEntrar}
                  disabled={loading || (dataMode==='real' ? (!email.trim()||!senha.trim()) : !demoNome.trim())}
                  className="btn btn-primary"
                  style={{width:'100%',justifyContent:'center',padding:'14px',fontSize:15,
                    opacity: (dataMode==='real' ? (email.trim()&&senha.trim()) : demoNome.trim()) ? 1 : 0.5}}
                >
                  {loading ? <><Icon name="Loader2" size={18}/> A verificar...</> : <>Entrar no Sistema <Icon name="ArrowRight" size={18}/></>}
                </button>

                {dataMode === 'real' && (
                  <div style={{marginTop:14,fontSize:12,color:'var(--text-tertiary)',textAlign:'center'}}>
                    Credenciais definidas na aba <span className="mono" style={{color:'var(--accent-secondary)'}}>_Usuarios</span> da planilha
                  </div>
                )}
              </div>
            </div>
            <div style={{textAlign:'center',marginTop:20,fontSize:11,color:'var(--text-quaternary)'}} className="mono">
              {dataMode==='real' ? '◢ DADOS REAIS · GOOGLE SHEETS CONECTADO' : '◢ MODO DEMO · DADOS FICTÍCIOS'}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ───────────────────────────────────────────────────────────────

const NAV_ITEMS = [
  { id: "overview", icon: "LayoutDashboard", label: "Overview" },

  { id: "anthro", icon: "Ruler", label: "Antropometria" },

  { id: "forms", icon: "ClipboardList", label: "Formulários" },
  { id: "calendar", icon: "Calendar", label: "Calendário" },

];

  <div style={{
    width: 'var(--sidebar-w)',

    flexDirection: 'column',
