// ───────────────────────────────────────────────────────────────
// HEADER
// ───────────────────────────────────────────────────────────────
const Header = ({ user, page, onLogout, onAddData, dataMode, onDisconnect, lastSync, syncing, onRefresh, onNav, onSelectAthlete, notifications = [], onClearNotifs, onMarkRead }) => {
  const { athletes: ATHLETES = [] } = useData() || {};
  const [notifOpen, setNotifOpen] = useState(false);
  const [profileOpen, setProfileOpen] = useState(false);
  const [addOpen, setAddOpen] = useState(false);
  const [searchQ, setSearchQ] = useState('');
  const [searchOpen, setSearchOpen] = useState(false);

  // Tempo desde última sync
  const [syncAgo, setSyncAgo] = useState('');
  useEffect(() => {
    const update = () => {
      if (!lastSync) { setSyncAgo(''); return; }
      const secs = Math.floor((Date.now() - lastSync) / 1000);
      if (secs < 60) setSyncAgo('agora mesmo');
      else if (secs < 3600) setSyncAgo(`há ${Math.floor(secs/60)}min`);
      else setSyncAgo(`há ${Math.floor(secs/3600)}h`);
    };
    update();
    const t = setInterval(update, 30000);
    return () => clearInterval(t);
  }, [lastSync]);

  // Resultados de busca
  const searchResults = useMemo(() => buscarGlobal(searchQ, ATHLETES), [searchQ, ATHLETES]);
  const hasResults = searchResults.athletes.length > 0 || searchResults.pages.length > 0;

  const naoLidas = notifications.filter(n => !n.lida).length;

  const pageTitle = {
    overview: "Visão Geral", athletes: "Gestão de Atletas",
    training: "Questionários", gps: "Análise GPS",
    anthro: "Antropometria", injuries: "Departamento Médico",
    forms: "Formulários", calendar: "Calendário", settings: "Configurações"
  }[page] || "Visão Geral";

  // Formulários para o menu rápido de "Novo Registro"
  const quickForms = [
    { id:'pretreino',     label:'Pré-Treino (Bem-Estar)', icon:'Sunrise', color:'#059669' },
    { id:'postreino',     label:'Pós-Treino (PSE)',       icon:'Sunset',  color:'#7C3AED' },
    { id:'antropometria', label:'Antropometria',          icon:'Ruler',   color:'#D97706' },
    { id:'lesoes',        label:'Registo de Lesão',       icon:'Heart',   color:'#DC2626' },
    { id:'cadastro',      label:'Cadastro de Atleta',     icon:'UserPlus',color:'#1A56DB' }
  ];

  const irParaForm = (formId) => {
    setAddOpen(false);
    if (onNav) onNav('forms');
  };

  const selecionarResultado = (tipo, item) => {
    setSearchQ(''); setSearchOpen(false);
    if (tipo === 'page' && onNav) onNav(item.id);
    if (tipo === 'athlete' && onSelectAthlete) onSelectAthlete(item);
  };

  return (
    <div style={{
      height: 'var(--header-h)',
      borderBottom: '1px solid var(--border-subtle)',
      display: 'flex', alignItems: 'center',
      padding: '0 24px',
      background: 'var(--bg-primary)',
      gap: 16, flexShrink:0,
      position:'relative', zIndex: 50
    }}>
      <div style={{flex:1, minWidth:0}}>
        <div className="mono" style={{fontSize:10, color:'var(--text-tertiary)', letterSpacing:'0.15em', textTransform:'uppercase'}}>
          {getTeamName()} · {SEASON}
        </div>
        <div className="headline" style={{fontSize:18, fontWeight:700, marginTop:2}}>
          {pageTitle}
        </div>
      </div>

      {/* Search com resultados */}
      <div style={{position:'relative', width:300}}>
        <Icon name="Search" size={16} style={{position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', color:'var(--text-tertiary)', pointerEvents:'none', zIndex:1}} />
        <input
          className="input"
          placeholder="Buscar atletas, páginas..."
          value={searchQ}
          onChange={e => { setSearchQ(e.target.value); setSearchOpen(true); }}
          onFocus={() => setSearchOpen(true)}
          style={{paddingLeft:36, fontSize:13}}
        />
        {searchQ && (
          <button onClick={() => { setSearchQ(''); setSearchOpen(false); }} style={{position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', cursor:'pointer', color:'var(--text-tertiary)', display:'flex'}}>
            <Icon name="X" size={14}/>
          </button>
        )}

        {searchOpen && searchQ.length >= 1 && (
          <>
            <div onClick={() => setSearchOpen(false)} style={{position:'fixed', inset:0, zIndex:90}}/>
            <div style={{
              position:'absolute', left:0, right:0, top:'calc(100% + 8px)',
              background:'var(--bg-elevated)', border:'1px solid var(--border-default)',
              borderRadius:12, padding:8, boxShadow:'var(--shadow-lg)', zIndex:100, maxHeight:420, overflowY:'auto'
            }}>
              {!hasResults && (
                <div style={{padding:'16px 12px', fontSize:13, color:'var(--text-tertiary)', textAlign:'center'}}>
                  Nada encontrado para "{searchQ}"
                </div>
              )}
              {searchResults.athletes.length > 0 && (
                <div>
                  <div className="mono" style={{fontSize:9, color:'var(--text-tertiary)', textTransform:'uppercase', letterSpacing:'0.15em', padding:'8px 10px 4px'}}>Atletas</div>
                  {searchResults.athletes.map(a => (
                    <div key={a.id} onClick={() => selecionarResultado('athlete', a)} style={{padding:'8px 10px', display:'flex', alignItems:'center', gap:10, borderRadius:8, cursor:'pointer'}}
                      onMouseEnter={e=>e.currentTarget.style.background='var(--bg-hover)'}
                      onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <div style={{width:28, height:28, borderRadius:7, flexShrink:0, background:`${positionColor(a.position)}22`, color:positionColor(a.position), display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, fontWeight:700, fontFamily:'var(--font-mono)'}}>{a.avatar}</div>
                      <div style={{flex:1, minWidth:0}}>
                        <div style={{fontSize:13, fontWeight:600}}>{a.name}</div>
                        <div className="mono" style={{fontSize:10, color:'var(--text-tertiary)'}}>{a.positionLabel || a.position} · #{a.number}</div>
                      </div>
                      <Icon name="ChevronRight" size={14} color="var(--text-tertiary)"/>
                    </div>
                  ))}
                </div>
              )}
              {searchResults.pages.length > 0 && (
                <div>
                  <div className="mono" style={{fontSize:9, color:'var(--text-tertiary)', textTransform:'uppercase', letterSpacing:'0.15em', padding:'8px 10px 4px'}}>Páginas</div>
                  {searchResults.pages.map(p => (
                    <div key={p.id} onClick={() => selecionarResultado('page', p)} style={{padding:'8px 10px', display:'flex', alignItems:'center', gap:10, borderRadius:8, cursor:'pointer'}}
                      onMouseEnter={e=>e.currentTarget.style.background='var(--bg-hover)'}
                      onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <div style={{width:28, height:28, borderRadius:7, flexShrink:0, background:'var(--bg-tertiary)', color:'var(--accent-primary)', display:'flex', alignItems:'center', justifyContent:'center'}}><Icon name={p.icon} size={15}/></div>
                      <div style={{flex:1, fontSize:13, fontWeight:500}}>{p.label}</div>
                      <Icon name="ChevronRight" size={14} color="var(--text-tertiary)"/>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </>
        )}
      </div>

      {/* Novo Registro com menu */}
      <div style={{position:'relative'}}>
        <button onClick={() => { setAddOpen(!addOpen); setNotifOpen(false); setProfileOpen(false); }} className="btn btn-primary" style={{height:40}}>
          <Icon name="Plus" size={16} />
          Novo Registro
          <Icon name="ChevronDown" size={14} />
        </button>
        {addOpen && (
          <>
            <div onClick={() => setAddOpen(false)} style={{position:'fixed', inset:0, zIndex:90}}/>
            <div style={{position:'absolute', right:0, top:'calc(100% + 8px)', width:260, background:'var(--bg-elevated)', border:'1px solid var(--border-default)', borderRadius:12, padding:8, boxShadow:'var(--shadow-lg)', zIndex:100}}>
              <div className="mono" style={{fontSize:9, color:'var(--text-tertiary)', textTransform:'uppercase', letterSpacing:'0.15em', padding:'6px 10px 8px'}}>Abrir formulário</div>
              {quickForms.map(f => (
                <div key={f.id} onClick={() => irParaForm(f.id)} style={{padding:'9px 10px', display:'flex', alignItems:'center', gap:10, borderRadius:8, cursor:'pointer'}}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--bg-hover)'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <div style={{width:30, height:30, borderRadius:8, flexShrink:0, background:`${f.color}25`, color:f.color, display:'flex', alignItems:'center', justifyContent:'center'}}><Icon name={f.icon} size={16}/></div>
                  <span style={{fontSize:13, fontWeight:500}}>{f.label}</span>
                </div>
              ))}
            </div>
          </>
        )}
      </div>

      {/* Refresh button — só modo real */}
      {dataMode === 'real' && (
        <div style={{display:'flex', alignItems:'center', gap:8}}>
          <button
            onClick={onRefresh}
            disabled={syncing}
            className="btn btn-ghost"
            style={{height:40, padding:'0 12px', gap:6}}
            title="Actualizar dados do Google Sheets"
          >
            <Icon name={syncing ? "Loader2" : "RefreshCw"} size={16} style={syncing ? {animation:'spin 1s linear infinite'} : {}}/>
            {syncing ? 'A sincronizar...' : 'Actualizar'}
          </button>
          {lastSync && (
            <span className="mono" style={{fontSize:10, color:'var(--text-tertiary)', whiteSpace:'nowrap'}}>
              {syncAgo}
            </span>
          )}
        </div>
      )}

      {/* Notifications */}
      <div style={{position:'relative'}}>
        <button
          onClick={() => { setNotifOpen(!notifOpen); setProfileOpen(false); setAddOpen(false); if (!notifOpen && onMarkRead) onMarkRead(); }}
          className="btn btn-ghost"
          style={{padding:'8px 10px', height:40, position:'relative'}}
        >
          <Icon name="Bell" size={18} />
          {naoLidas > 0 && (
            <span style={{
              position:'absolute', top:2, right:2,
              minWidth:16, height:16, padding:'0 4px', borderRadius:8,
              background:'var(--accent-danger)', color:'#fff',
              fontSize:9, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center',
              boxShadow:'0 0 0 2px var(--bg-primary)'
            }}>{naoLidas}</span>
          )}
        </button>

        {notifOpen && (
          <>
            <div onClick={() => setNotifOpen(false)} style={{position:'fixed', inset:0, zIndex:90}}/>
            <div style={{
              position:'absolute', right:0, top:'calc(100% + 8px)',
              width:360, background:'var(--bg-elevated)',
              border:'1px solid var(--border-default)',
              borderRadius:12, padding:8,
              boxShadow:'var(--shadow-lg)', zIndex:100, maxHeight:440, overflowY:'auto'
            }}>
              <div style={{padding:'8px 12px 12px 12px', borderBottom:'1px solid var(--border-subtle)', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <div style={{fontSize:13, fontWeight:600}}>Notificações</div>
                {notifications.length > 0 && (
                  <button onClick={() => { if (onClearNotifs) onClearNotifs(); }} className="mono" style={{fontSize:10, color:'var(--accent-secondary)', background:'none', border:'none', cursor:'pointer'}}>limpar tudo</button>
                )}
              </div>
              {notifications.length === 0 ? (
                <div style={{padding:'24px 12px', textAlign:'center', color:'var(--text-tertiary)', fontSize:13}}>
                  <Icon name="Bell" size={28}/>
                  <div style={{marginTop:8}}>Sem notificações novas</div>
                </div>
              ) : notifications.map((n,i) => (
                <div key={n.id+i} onClick={() => { if (n.page && onNav) { setNotifOpen(false); onNav(n.page); } }} style={{padding:'12px', display:'flex', gap:10, borderRadius:8, cursor: n.page ? 'pointer' : 'default', background: n.lida ? 'transparent' : 'rgba(197,255,62,0.04)'}}
                  onMouseEnter={e => { if(n.page) e.currentTarget.style.background='var(--bg-hover)'; }}
                  onMouseLeave={e => { e.currentTarget.style.background = n.lida ? 'transparent' : 'rgba(197,255,62,0.04)'; }}>
                  <div style={{
                    width:32, height:32, borderRadius:8, flexShrink:0,
                    background: n.type === 'warning' ? 'rgba(255,158,44,0.15)' : n.type === 'success' ? 'rgba(0,230,118,0.15)' : 'rgba(0,217,255,0.15)',
                    color: n.type === 'warning' ? 'var(--accent-warning)' : n.type === 'success' ? 'var(--accent-success)' : 'var(--accent-secondary)',
                    display:'flex', alignItems:'center', justifyContent:'center'
                  }}>
                    <Icon name={n.icon} size={16} />
                  </div>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{fontSize:13, lineHeight:1.4}}>{n.text}</div>
                    <div className="mono" style={{fontSize:10, color:'var(--text-tertiary)', marginTop:2}}>{n.persistente ? 'estado atual' : 'nova actualização'}</div>
                  </div>
                  {n.page && <Icon name="ChevronRight" size={14} color="var(--text-quaternary)" style={{flexShrink:0, marginTop:2}}/>}
                  {!n.lida && !n.page && <span style={{width:7, height:7, borderRadius:'50%', background:'var(--accent-primary)', flexShrink:0, marginTop:6}}/>}
                  {!n.lida && n.page && <span style={{width:7, height:7, borderRadius:'50%', background:'var(--accent-primary)', flexShrink:0, marginTop:6}}/>}
                </div>
              ))}
            </div>
          </>
        )}
      </div>

      {/* Profile */}
      <div style={{position:'relative'}}>
        <button
          onClick={() => { setProfileOpen(!profileOpen); setNotifOpen(false); setAddOpen(false); }}
          style={{
            display:'flex', alignItems:'center', gap:10,
            padding:'4px 10px 4px 4px', height:40,
            background:'var(--bg-elevated)',
            border:'1px solid var(--border-default)',
            borderRadius:999, cursor:'pointer',
            color:'var(--text-primary)'
          }}
        >
          <div style={{
            width:32, height:32, borderRadius:'50%',
            background:'var(--accent-primary)',
            display:'flex', alignItems:'center', justifyContent:'center',
            color:'var(--bg-primary)', fontWeight:700, fontSize:12
          }}>{user.avatar}</div>
          <div style={{textAlign:'left'}}>
            <div style={{fontSize:12, fontWeight:600, lineHeight:1.2}}>{user.name.split(' ')[0]}</div>
            <div className="mono" style={{fontSize:9, color:'var(--text-tertiary)', lineHeight:1.2}}>{user.role}</div>
          </div>
        </button>

        {profileOpen && (
          <>
            <div onClick={() => setProfileOpen(false)} style={{position:'fixed', inset:0, zIndex:90}}/>
            <div style={{
              position:'absolute', right:0, top:'calc(100% + 8px)',
              width:240, background:'var(--bg-elevated)',
              border:'1px solid var(--border-default)',
              borderRadius:12, padding:8,
              boxShadow:'var(--shadow-lg)', zIndex:100
            }}>
              <div style={{padding:12, borderBottom:'1px solid var(--border-subtle)'}}>
                <div style={{fontSize:14, fontWeight:600}}>{user.name}</div>
                <span className="badge" style={{
                  marginTop:8,
                  background:'rgba(197,255,62,0.1)',
                  color:'var(--accent-primary)'
                }}>{user.role}</span>
              </div>
              <div style={{padding:'8px 0'}}>
                {[
                  { icon: "Settings", label: "Configurações", action: () => { setProfileOpen(false); if (onNav) onNav('settings'); } },
                  { icon: "RefreshCw", label: "Atualizar dados", action: () => { setProfileOpen(false); if (onRefresh) onRefresh(); } }
                ].map((item, i) => (
                  <div key={i} onClick={item.action} style={{
                    padding:'8px 12px', display:'flex', alignItems:'center', gap:10,
                    cursor:'pointer', borderRadius:6, fontSize:13
                  }}
                  onMouseEnter={e => e.currentTarget.style.background='var(--bg-hover)'}
                  onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                    <Icon name={item.icon} size={16} color="var(--text-secondary)" />
                    {item.label}
                  </div>
                ))}
              </div>
              <div style={{padding:'8px 0', borderTop:'1px solid var(--border-subtle)'}}>
                <div onClick={onLogout} style={{
                  padding:'8px 12px', display:'flex', alignItems:'center', gap:10,
                  cursor:'pointer', borderRadius:6, fontSize:13,
                  color:'var(--accent-danger)'
                }}
                onMouseEnter={e => e.currentTarget.style.background='rgba(255,59,92,0.1)'}
                onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                  <Icon name="LogOut" size={16} />
                  Sair
                </div>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
};
// ───────────────────────────────────────────────────────────────
// SHARED CHART COMPONENTS
// ───────────────────────────────────────────────────────────────

const CustomTooltip = ({ active, payload, label }) => {
  if (!active || !payload || !payload.length) return null;
  return (
    <div style={{
      background:'var(--bg-elevated)',
      border:'1px solid var(--border-default)',
      borderRadius:8,
      padding:'10px 14px',
      fontSize:12,
      boxShadow:'var(--shadow-md)'
    }}>
      {label && <div className="mono" style={{fontSize:10, color:'var(--text-tertiary)', marginBottom:6, textTransform:'uppercase', letterSpacing:'0.1em'}}>{label}</div>}
      {payload.map((p, i) => (
        <div key={i} style={{display:'flex', justifyContent:'space-between', gap:16, alignItems:'center'}}>
          <div style={{display:'flex', alignItems:'center', gap:6}}>
            <div style={{width:8, height:8, borderRadius:2, background:p.color || p.fill}}/>

          </div>
          <span style={{fontWeight:600, fontFamily:'var(--font-mono)'}}>{typeof p.value === 'number' ? p.value.toLocaleString('pt-BR') : p.value}</span>
        </div>
      ))}
    </div>
  );
};

  return (
    <div onClick={onClick} className="card" style={{padding:'16px 20px', cursor: onClick ? 'pointer':'default', display:'flex', alignItems:'center', gap:16}}>
      <div style={{width:44, height:44, borderRadius:12, background:`${color}20`, color, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
        <Icon name={icon} size={22}/>
      </div>
      <div style={{flex:1, minWidth:0}}>
        <div style={{fontSize:13, color:'var(--text-secondary)', marginBottom:4}}>{label}</div>

          <span className="display tabular" style={{fontSize:24, lineHeight:1}}>{done}</span>

};

// ───────────────────────────────────────────────────────────────
// OVERVIEW DASHBOARD
// ───────────────────────────────────────────────────────────────
const OverviewDashboard = ({ onNav, onSelectAthlete }) => {
  const { athletes: ATHLETES = [], trainingData: TRAINING_DATA = [], gpsData: GPS_DATA = [], injuries: INJURIES = [] } = useData() || {};
  const [sortBy, setSortBy] = useState('alfabetica');
  const [pdfMenuOpen, setPdfMenuOpen] = useState(false);

  // Estado diário de cada atleta (bem-estar, PSE, ACWR, dores, risco)
  const athleteStates = useMemo(() => {
    return ATHLETES.map(a => ({
      athlete: a,
      estado: estadoDiarioAtleta(a, TRAINING_DATA, GPS_DATA, INJURIES)
    }));
  }, [ATHLETES, TRAINING_DATA, GPS_DATA, INJURIES]);

  // Ordenação dos cards
  const sortedStates = useMemo(() => {
    const arr = [...athleteStates];
    const statusOrder = { 'Disponível': 0, 'Condicionado': 1, 'Lesionado': 2 };
    switch (sortBy) {
      case 'bemestar':
        arr.sort((a,b) => (b.estado.bemEstar ?? -1) - (a.estado.bemEstar ?? -1)); break;
      case 'pse':
        arr.sort((a,b) => (b.estado.pse ?? -1) - (a.estado.pse ?? -1)); break;
      case 'acwr':
        arr.sort((a,b) => (b.estado.acwr ?? 0) - (a.estado.acwr ?? 0)); break;
      case 'posicao':
        arr.sort((a,b) => (a.athlete.position||'').localeCompare(b.athlete.position||'')); break;
      case 'status':
        arr.sort((a,b) => (statusOrder[a.estado.disponibilidade.status] ?? 9) - (statusOrder[b.estado.disponibilidade.status] ?? 9)); break;
      default: // alfabetica
        arr.sort((a,b) => (a.athlete.name||'').localeCompare(b.athlete.name||''));
    }
    return arr;
  }, [athleteStates, sortBy]);

  // Indicadores de completude diária
  const completude = useMemo(() => {
    const total = ATHLETES.length;
    const respBem = athleteStates.filter(s => s.estado.respondeuBemEstar).length;
    const respPSE = athleteStates.filter(s => s.estado.respondeuPSE).length;
    return { total, respBem, respPSE };
  }, [athleteStates, ATHLETES]);

  // Calculate aggregate KPIs
  const stats = useMemo(() => {
    const ativos = ATHLETES.filter(a => a.status === "Ativo").length;
    const lesionados = ATHLETES.filter(a => a.status === "Lesionado").length;
    const last7Days = TRAINING_DATA.filter(t => {
      const days = (new Date() - t.dateObj) / (1000*60*60*24);
      return days <= 7;
    });
    const avgPSE = last7Days.reduce((s,t) => s + t.pse, 0) / Math.max(1, last7Days.length);
    const totalLoad = last7Days.reduce((s,t) => s + t.internalLoad, 0);
    const avgWellness = last7Days.reduce((s,t) => s + t.wellness, 0) / Math.max(1, last7Days.length);
    
    const last7DaysGPS = GPS_DATA.filter(g => {
      const days = (new Date() - g.dateObj) / (1000*60*60*24);
      return days <= 7;
    });
    const totalDistance = last7DaysGPS.reduce((s,g) => s + g.totalDistance, 0);
    
    return { ativos, lesionados, avgPSE, totalLoad, avgWellness, totalDistance, sessoes: last7Days.length };
  }, [TRAINING_DATA, GPS_DATA, ATHLETES]);
  
  // Load trend (last 30 days, daily aggregate)
  const loadTrend = useMemo(() => {
    const map = new Map();
    TRAINING_DATA.forEach(t => {
      const days = Math.floor((new Date() - t.dateObj) / (1000*60*60*24));
      if (days > 30) return;
      if (!map.has(t.date)) map.set(t.date, { date: t.date, load: 0, count: 0, pse: 0, wellness: 0 });
      const e = map.get(t.date);
      e.load += t.internalLoad;
      e.count += 1;
      e.pse += t.pse;
      e.wellness += t.wellness;
    });
    return Array.from(map.values())
      .map(e => ({
        date: fmt.shortDate(e.date),
        load: Math.round(e.load),
        avgPSE: +(e.pse / e.count).toFixed(1),
        avgWellness: +(e.wellness / e.count).toFixed(1)
      }))
      .sort((a,b) => {
        const [da,ma] = a.date.split('/').map(Number);
        const [db,mb] = b.date.split('/').map(Number);
        return (ma - mb) || (da - db);
      });
  }, [TRAINING_DATA]);
  
  // Position distribution
  const positionDist = useMemo(() => {
    const groups = { "Goleiros": 0, "Defensores": 0, "Meio-Campo": 0, "Atacantes": 0 };
    ATHLETES.forEach(a => {
      if (a.position === "GK") groups["Goleiros"]++;
      else if (["CB","RB","LB"].includes(a.position)) groups["Defensores"]++;
      else if (["CDM","CM","CAM"].includes(a.position)) groups["Meio-Campo"]++;
      else groups["Atacantes"]++;
    });
    const colors = ["#FFB627","#00D9FF","#C5FF3E","#FF3B5C"];
    return Object.entries(groups).map(([name,value],i) => ({ name, value, fill: colors[i] }));
  }, [ATHLETES]);
  
  // Top performers (highest avg load)
  const topPerformers = useMemo(() => {
    const map = new Map();
    TRAINING_DATA.filter(t => {
      const days = (new Date() - t.dateObj) / (1000*60*60*24);
      return days <= 7;
    }).forEach(t => {
      if (!map.has(t.athleteId)) map.set(t.athleteId, { name: t.athleteNick, athleteId: t.athleteId, load: 0, count: 0, pse: 0 });
      const e = map.get(t.athleteId);
      e.load += t.internalLoad;
      e.count += 1;
      e.pse += t.pse;
    });
    return Array.from(map.values())
      .map(e => ({ ...e, avgPSE: +(e.pse/e.count).toFixed(1) }))
      .sort((a,b) => b.load - a.load)
      .slice(0, 8);
  }, [TRAINING_DATA]);
  
  // Wellness distribution by player (last week avg)
  const wellnessByPlayer = useMemo(() => {
    const map = new Map();
    TRAINING_DATA.filter(t => {
      const days = (new Date() - t.dateObj) / (1000*60*60*24);
      return days <= 7;
    }).forEach(t => {
      if (!map.has(t.athleteId)) map.set(t.athleteId, { name: t.athleteNick, sum: 0, count: 0 });
      const e = map.get(t.athleteId);
      e.sum += t.wellness;
      e.count += 1;
    });
    return Array.from(map.values())
      .map(e => ({ name: e.name, wellness: +(e.sum/e.count).toFixed(2) }))
      .sort((a,b) => a.wellness - b.wellness)
      .slice(0, 12);
  }, [TRAINING_DATA]);
  
  // Recent injuries
  const recentInjuries = useMemo(() => INJURIES.slice(0, 5), [INJURIES]);
  
  return (
    <div style={{display:'flex', flexDirection:'column', gap:24}}>

      {/* Header com botão PDF + período */}
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <div>
          <div className="mono" style={{fontSize:10, color:'var(--accent-primary)', textTransform:'uppercase', letterSpacing:'0.2em', marginBottom:2}}>◢ Dashboard</div>
          <div className="headline" style={{fontSize:22, fontWeight:700}}>Visão Geral da Equipa</div>
        </div>
        <div style={{position:'relative'}}>
          <button
            onClick={() => setPdfMenuOpen(!pdfMenuOpen)}
            className="btn btn-ghost"
            style={{height:40, gap:8}}
          >
            <Icon name="FileText" size={16}/> Exportar PDF <Icon name="ChevronDown" size={14}/>
          </button>
          {pdfMenuOpen && (
            <>
              <div onClick={() => setPdfMenuOpen(false)} style={{position:'fixed', inset:0, zIndex:90}}/>
              <div style={{position:'absolute', right:0, top:'calc(100% + 8px)', width:220, background:'var(--bg-elevated)', border:'1px solid var(--border-default)', borderRadius:12, padding:8, boxShadow:'var(--shadow-lg)', zIndex:100}}>
                <div className="mono" style={{fontSize:9, color:'var(--text-tertiary)', textTransform:'uppercase', letterSpacing:'0.15em', padding:'6px 10px 8px'}}>Período do relatório</div>
                {[{p:1,l:'Hoje'},{p:7,l:'Últimos 7 dias'},{p:14,l:'Últimos 14 dias'},{p:21,l:'Últimos 21 dias'}].map(o => (
                  <div key={o.p} onClick={() => { setPdfMenuOpen(false); exportTeamReportPDF(ATHLETES, TRAINING_DATA, GPS_DATA, INJURIES, o.p); }}
                    style={{padding:'9px 10px', display:'flex', alignItems:'center', gap:10, borderRadius:8, cursor:'pointer', fontSize:13}}
                    onMouseEnter={e=>e.currentTarget.style.background='var(--bg-hover)'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <Icon name="Calendar" size={15} color="var(--text-tertiary)"/> {o.l}
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>

      {/* ─── Indicadores de completude diária ─── */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
        <CompletudeCard
          icon="Smile" label="Bem-Estar hoje"
          done={completude.respBem} total={completude.total}
          color="var(--accent-secondary)"
          onClick={() => onNav && onNav('training')}
        />
        <CompletudeCard
          icon="Activity" label="Pós-Treino (PSE) hoje"
          done={completude.respPSE} total={completude.total}
          color="var(--accent-primary)"
          onClick={() => onNav && onNav('training')}
        />
      </div>

      {/* ─── Cards individuais dos atletas ─── */}
      <div className="card" style={{padding:20}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16, flexWrap:'wrap', gap:12}}>
          <div>
            <div className="mono" style={{fontSize:10, color:'var(--accent-primary)', textTransform:'uppercase', letterSpacing:'0.2em', marginBottom:2}}>◢ Estado do Plantel · Hoje</div>
            <div className="headline" style={{fontSize:18, fontWeight:700}}>Atletas</div>
          </div>
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            <span className="mono" style={{fontSize:10, color:'var(--text-tertiary)'}}>ORDENAR:</span>
            <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="input" style={{width:'auto', padding:'6px 10px', fontSize:12, cursor:'pointer'}}>
              <option value="alfabetica">Alfabética</option>
              <option value="status">Status</option>
              <option value="acwr">ACWR</option>
              <option value="bemestar">Bem-estar</option>
              <option value="pse">PSE</option>
              <option value="posicao">Posição</option>
            </select>
          </div>
        </div>

        {sortedStates.length === 0 ? (
          <div style={{padding:'40px 20px', textAlign:'center', color:'var(--text-tertiary)', fontSize:13}}>
            <Icon name="Users" size={32}/>
            <div style={{marginTop:8}}>Nenhum atleta cadastrado ainda.</div>

        ) : (

                onClick={() => onSelectAthlete && onSelectAthlete(athlete)}
              />

      </div>

          <KPICard icon="Users" label="Atletas Ativos" value={stats.ativos} sublabel={`de ${ATHLETES.length} no elenco`} color="var(--accent-success)" trend={0} delay={0}/>
        </div>
        <div onClick={() => onNav && onNav('injuries')} style={{cursor:'pointer'}}>
          <KPICard icon="Heart" label="Em Recuperação" value={stats.lesionados} sublabel="atletas lesionados" color="var(--accent-danger)" trend={-25} delay={1}/>
        </div>
        <div onClick={() => onNav && onNav('training')} style={{cursor:'pointer'}}>
          <KPICard icon="Activity" label="PSE Médio (7d)" value={stats.avgPSE.toFixed(1)} sublabel={`${stats.sessoes} sessões`} color="var(--accent-primary)" trend={3} delay={2}/>
        </div>
        <div onClick={() => onNav && onNav('training')} style={{cursor:'pointer'}}>
          <KPICard icon="Flame" label="Carga Total (7d)" value={fmt.num(stats.totalLoad)} sublabel="UA semanais" color="var(--accent-warning)" trend={8} delay={3}/>
        </div>
        <div onClick={() => onNav && onNav('training')} style={{cursor:'pointer'}}>
          <KPICard icon="Smile" label="Bem-Estar (7d)" value={stats.avgWellness.toFixed(1)} sublabel="média do elenco / 5.0" color="var(--accent-secondary)" trend={2} delay={4}/>
        </div>
        <div onClick={() => onNav && onNav('gps')} style={{cursor:'pointer'}}>

      {/* Main grid */}

            <div style={{display:'flex', gap:6}}>
              {["7D","30D","Tudo"].map((p,i) => (
                <button key={i} className="btn btn-ghost" style={{padding:'4px 12px', fontSize:11, height:'auto', background: i === 1 ? 'var(--bg-elevated)' : 'transparent'}}>{p}</button>

          <ResponsiveContainer width="100%" height={280}>
            <ComposedChart data={loadTrend} margin={{top:10, right:10, left:0, bottom:0}}>

                  <stop offset="0%" stopColor="#C5FF3E" stopOpacity={0.4}/>

              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" vertical={false}/>

const thStyle = { textAlign:'left', padding:'12px 16px', fontSize:10, fontFamily:'var(--font-mono)', textTransform:'uppercase', letterSpacing:'0.1em', color:'var(--text-tertiary)', fontWeight:600 };

// ATHLETE PROFILE (modal/page)

const AthleteProfile = ({ athlete, onClose }) => {
  const [tab, setTab] = useState("overview");
  const { trainingData: TD = [], gpsData: GD = [], anthroData: AD = [], injuries: INJ = [] } = useData() || {};

  const trainingData = useMemo(() => 
    (TD || []).filter(t => t.athleteId === athlete.id).slice(-30),
    [athlete.id, TD]
  );
  
  const gpsData = useMemo(() => 
    (GD || []).filter(g => g.athleteId === athlete.id).slice(-15),
    [athlete.id, GD]
  );
  
  const anthroData = useMemo(() =>
    (AD || []).filter(a => a.athleteId === athlete.id),
    [athlete.id, AD]
  );
  
  const injuries = useMemo(() =>
    (INJ || []).filter(i => i.athleteId === athlete.id),
    [athlete.id, INJ]
  );
  
  // Scatter data: todos os atletas (usa TD completo já em scope)
  const scatterData = useMemo(() => {
    const map = new Map();
    (TD || []).filter(t => {
      const d = (new Date() - t.dateObj) / 864e5;
      return d >= 0 && d <= 30 && t.pse > 0;
    }).forEach(t => {
      if (!map.has(t.athleteId)) map.set(t.athleteId, {
        name: t.athleteNick, position: t.position,
        isThis: t.athleteId === athlete.id, load: 0, pse: 0, n: 0
      });
      const e = map.get(t.athleteId);
      e.load += (t.internalLoad || (t.pse * (t.duration || 90)));
      e.pse += t.pse; e.n++;
    });
    return Array.from(map.values()).map(e => ({
      ...e, pse: e.n > 0 ? +(e.pse / e.n).toFixed(2) : 0
    }));
  }, [TD, athlete.id]);

  // Stats
  const stats = useMemo(() => {
    const recentTraining = trainingData.slice(-7);
    const avgPSE = recentTraining.length ? recentTraining.reduce((s,t) => s + t.pse, 0) / recentTraining.length : 0;
    const totalLoad = recentTraining.reduce((s,t) => s + t.internalLoad, 0);
    const avgWellness = recentTraining.length ? recentTraining.reduce((s,t) => s + t.wellness, 0) / recentTraining.length : 0;
    
    const recentGPS = gpsData.slice(-5);
    const totalDist = recentGPS.reduce((s,g) => s + g.totalDistance, 0);
    const avgTopSpeed = recentGPS.length ? recentGPS.reduce((s,g) => s + g.topSpeed, 0) / recentGPS.length : 0;
    
    return { avgPSE, totalLoad, avgWellness, totalDist, avgTopSpeed };
  }, [trainingData, gpsData]);
  
  // Radar — performance profile
  const radarData = useMemo(() => {
    const recent = gpsData.slice(-5);
    if (!recent.length) return [];
    const avg = recent.reduce((acc,g) => ({
      dist: acc.dist + g.totalDistance,
      hsr: acc.hsr + g.hsr,
      sprint: acc.sprint + g.sprintCount,
      topSpeed: acc.topSpeed + g.topSpeed,
      load: acc.load + g.playerLoad,
      accel: acc.accel + g.accelerations
    }), { dist:0, hsr:0, sprint:0, topSpeed:0, load:0, accel:0 });
    
    return [
      { metric: "Distância", value: Math.min(100, (avg.dist/recent.length / 11000) * 100) },
      { metric: "HSR", value: Math.min(100, (avg.hsr/recent.length / 600) * 100) },
      { metric: "Sprints", value: Math.min(100, (avg.sprint/recent.length / 25) * 100) },
      { metric: "Vel. Máx", value: Math.min(100, (avg.topSpeed/recent.length / 33) * 100) },
      { metric: "Carga", value: Math.min(100, (avg.load/recent.length / 600) * 100) },
      { metric: "Acelerações", value: Math.min(100, (avg.accel/recent.length / 60) * 100) }
    ];
  }, [gpsData]);
  
  // Wellness over time
  const wellnessChart = useMemo(() => 
    trainingData.map(t => ({
      date: fmt.shortDate(t.date),
      sono: t.sono, fadiga: 6-t.fadiga, humor: t.humor, dor: 6-t.dorMuscular, wellness: t.wellness
    })),
    [trainingData]
  );
  
  // Anthropometry trend
  const anthroChart = useMemo(() => 
    anthroData.map(a => ({
      date: fmt.shortDate(a.date),
      peso: a.weight, gordura: a.bodyFat, massa: a.muscleMass
    })),
    [anthroData]
  );
  
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="card animate-fadeUp" style={{
        width:'100%', maxWidth:1100, maxHeight:'92vh',
        overflow:'auto', padding:0, background:'var(--bg-secondary)'
      }} onClick={e => e.stopPropagation()}>
        
        {/* Hero */}
        <div style={{
          padding:32,
          background: `linear-gradient(135deg, ${positionColor(athlete.position)}25 0%, ${positionColor(athlete.position)}05 50%, transparent 100%)`,
          borderBottom:'1px solid var(--border-default)',
          position:'relative'
        }}>
          <button onClick={onClose} style={{
            position:'absolute', top:20, right:20,
            background:'var(--bg-elevated)', border:'1px solid var(--border-default)',
            width:36, height:36, borderRadius:'50%', cursor:'pointer',
            color:'var(--text-primary)', display:'flex', alignItems:'center', justifyContent:'center'
          }}><Icon name="X" size={18}/></button>

          {/* Botão PDF */}
          <button
            onClick={() => exportAthleteProfilePDF(athlete, trainingData, gpsData, anthroData, injuries)}
            style={{
              position:'absolute', top:20, right:64,
              background:'var(--bg-elevated)', border:'1px solid var(--border-default)',
              padding:'0 14px', height:36, borderRadius:8, cursor:'pointer',
              color:'var(--text-primary)', display:'flex', alignItems:'center', gap:6,
              fontSize:12, fontWeight:500
            }}
          >
            <Icon name="FileText" size={15}/> Exportar PDF
          </button>
          
          <div style={{display:'flex', gap:24, alignItems:'center'}}>
            <div style={{
              width:100, height:100, borderRadius:24,
              background:'var(--bg-elevated)',
              border:`3px solid ${positionColor(athlete.position)}`,
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:36, fontWeight:700,

// TRAINING PAGE
// ───────────────────────────────────────────────────────────────
const TrainingPage = () => {
  const { athletes: ATHLETES = [], trainingData: TRAINING_DATA = [] } = useData() || {};
  const [period, setPeriod] = useState(14);
  const [selectedAthletes, setSelectedAthletes] = useState([]);
  
  const dailyAggregates = useMemo(() => {
    const map = new Map();
    TRAINING_DATA.forEach(t => {
      if (!dentroPeriodo(t.dateObj, period)) return;
      if (!map.has(t.date)) map.set(t.date, { date:t.date, load:0, count:0, pse:0, wellness:0 });
      const e = map.get(t.date);
      e.load += t.internalLoad;
      e.count += 1;
      e.pse += t.pse;
      e.wellness += t.wellness;
    });
    return Array.from(map.values())
      .map(e => ({
        date: fmt.shortDate(e.date),
        rawDate: e.date,
        load: Math.round(e.load),
        sessions: e.count,
        avgPSE: +(e.pse/e.count).toFixed(1),
        avgWellness: +(e.wellness/e.count).toFixed(2)
      }))
      .sort((a,b) => new Date(a.rawDate) - new Date(b.rawDate));
  }, [period, TRAINING_DATA]);
  
  // ACWR — Acute:Chronic Workload Ratio — usa APENAS carga interna dos formulários (PSE × duração)
  const acwrData = useMemo(() => {
    const map = new Map();
    // Só registos com PSE e duração preenchidos (formulários pós-treino)
    TRAINING_DATA.filter(t => t.pse > 0 && t.duration > 0).forEach(t => {
      const days = Math.floor((new Date() - t.dateObj) / (1000*60*60*24));
      if (!map.has(t.athleteId)) map.set(t.athleteId, { name:t.athleteNick, position:t.position, acute:0, chronic:0 });
      const e = map.get(t.athleteId);
      const carga = t.internalLoad || (t.pse * t.duration);
      if (days >= 0 && days < 7)  e.acute  += carga;
      if (days >= 0 && days < 28) e.chronic += carga;
    });
    return Array.from(map.values())
      .map(e => ({
        name: e.name,
        position: e.position,
        acute: Math.round(e.acute),
        chronic: Math.round(e.chronic / 4),
        acwr: e.chronic > 0 ? +(e.acute / (e.chronic/4)).toFixed(2) : 0
      }))
      .filter(e => e.acwr > 0)
      .sort((a,b) => b.acwr - a.acwr);
  }, [TRAINING_DATA]);
  
  // PSE distribution
  const pseDistribution = useMemo(() => {
    const counts = Array(11).fill(0);
    TRAINING_DATA.filter(t => dentroPeriodo(t.dateObj, period)).forEach(t => {
      counts[t.pse]++;
    });
    return counts.slice(1).map((v, i) => ({ pse: i+1, count: v }));
  }, [period, TRAINING_DATA]);
  
  return (
    <div style={{display:'flex', flexDirection:'column', gap:20}}>
      {/* Filters */}
      <div className="card" style={{padding:16, display:'flex', gap:12, alignItems:'center', flexWrap:'wrap'}}>
        <div className="mono" style={{fontSize:11, color:'var(--text-tertiary)'}}>PERÍODO:</div>
        <div style={{display:'flex', gap:6, padding:4, background:'var(--bg-tertiary)', borderRadius:8, flexWrap:'wrap'}}>
          {[1, 7, 14, 21, 30, 60].map(p => (
            <button key={p} onClick={() => setPeriod(p)} style={{
              padding:'6px 14px', borderRadius:6, border:'none', cursor:'pointer',
              background: period === p ? 'var(--accent-primary)' : 'transparent',
              color: period === p ? 'var(--bg-primary)' : 'var(--text-secondary)',
              fontFamily:'var(--font-mono)', fontSize:11, fontWeight:600, whiteSpace:'nowrap'
            }}>{p === 1 ? 'HOJE' : p + 'D'}</button>
          ))}
        </div>
        <div style={{flex:1}}/>
        <button className="btn btn-ghost"><Icon name="Download" size={14}/>Exportar</button>
      </div>
      
      {/* Stats */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))', gap:12}}>
        <KPICard icon="Calendar" label="Sessões" value={dailyAggregates.reduce((s,d) => s + d.sessions, 0)} sublabel={period === 1 ? 'hoje' : `em ${period} dias`} color="var(--accent-secondary)" delay={0}/>
        <KPICard icon="Flame" label="Carga Total" value={fmt.num(dailyAggregates.reduce((s,d) => s + d.load, 0))} sublabel="UA acumuladas" color="var(--accent-primary)" delay={1}/>
        <KPICard icon="Activity" label="PSE Médio" value={(dailyAggregates.reduce((s,d) => s + d.avgPSE, 0) / Math.max(1, dailyAggregates.length)).toFixed(1)} sublabel="média do período" color="var(--accent-warning)" delay={2}/>
        <KPICard icon="AlertTriangle" label="Em Alerta" value={acwrData.filter(a => a.acwr > 1.5).length} sublabel="ACWR > 1.5" color="var(--accent-danger)" delay={3}/>
      </div>
      
      {/* Main chart */}

const GPSPage = () => {
  const { athletes: ATHLETES = [], gpsData: GPS_DATA = [] } = useData() || {};
  const [period, setPeriod] = useState(14);
  
  const filteredGPS = useMemo(() => {
    return GPS_DATA.filter(g => dentroPeriodo(g.dateObj, period));
  }, [period, GPS_DATA]);
  
  const stats = useMemo(() => {
    if (!filteredGPS.length) return { totalDist:0, avgDist:0, totalSprints:0, avgTopSpeed:0, sessions:0 };
    return {
      totalDist: filteredGPS.reduce((s,g) => s + g.totalDistance, 0),
      avgDist: filteredGPS.reduce((s,g) => s + g.totalDistance, 0) / filteredGPS.length,
      totalSprints: filteredGPS.reduce((s,g) => s + g.sprintCount, 0),
      avgTopSpeed: filteredGPS.reduce((s,g) => s + g.topSpeed, 0) / filteredGPS.length,
      sessions: filteredGPS.length,
      totalLoad: filteredGPS.reduce((s,g) => s + g.playerLoad, 0)
    };
  }, [filteredGPS]);
  
  // Top performers per metric
  const topByMetric = useMemo(() => {
    const map = new Map();
    filteredGPS.forEach(g => {
      if (!map.has(g.athleteId)) map.set(g.athleteId, {
        name:g.athleteNick, position:g.position, dist:0, hsr:0, sprints:0, topSpeed:0, count:0, load:0
      });
      const e = map.get(g.athleteId);
      e.dist += g.totalDistance;
      e.hsr += g.hsr;
      e.sprints += g.sprintCount;
      e.topSpeed = Math.max(e.topSpeed, g.topSpeed);
      e.load += g.playerLoad;
      e.count += 1;
    });
    return Array.from(map.values()).map(e => ({
      ...e,
      avgDist: e.dist / e.count,
      avgHSR: e.hsr / e.count,
      avgSprints: e.sprints / e.count,
      avgLoad: e.load / e.count
    }));
  }, [filteredGPS]);
  
  // Daily distance
  const dailyData = useMemo(() => {
    const map = new Map();
    filteredGPS.forEach(g => {
      if (!map.has(g.date)) map.set(g.date, {date:g.date, dist:0, hsr:0, sprints:0});
      const e = map.get(g.date);
      e.dist += g.totalDistance;
      e.hsr += g.hsr;
      e.sprints += g.sprintCount;
    });
    return Array.from(map.values())
      .map(e => ({date: fmt.shortDate(e.date), rawDate: e.date, dist: Math.round(e.dist/1000), hsr: Math.round(e.hsr), sprints: e.sprints}))
      .sort((a,b) => new Date(a.rawDate) - new Date(b.rawDate));

  // Speed zones aggregated

    const z = filteredGPS.reduce((acc, g) => ({

    const total = Object.values(z).reduce((s,v) => s+v, 0);
    return [
      { name: "Z1", desc: "Caminhada", value: z.z1, fill: "#4A5260", pct: (z.z1/total*100) },
      { name: "Z2", desc: "Trote",     value: z.z2, fill: "#00D9FF", pct: (z.z2/total*100) },

const AnthroPage = () => {
  const { athletes: ATHLETES = [], anthroData: ANTHRO_DATA = [] } = useData() || {};
  const [viewMode, setViewMode] = useState('grupo');   // 'grupo' | 'atleta'
  const [selectedAthId, setSelectedAthId] = useState('');
  const [evalCount, setEvalCount] = useState(1);        // últimas N avaliações

  // Avaliação mais recente por atleta (para tabela e cards grupo)
  const latest = useMemo(() => {
    const map = new Map();
    ANTHRO_DATA.forEach(a => {
      if (!map.has(a.athleteId) || new Date(map.get(a.athleteId).date) < new Date(a.date)) {
        map.set(a.athleteId, a);
      }
    });
    return Array.from(map.values()).sort((a,b) => a.bodyFat - b.bodyFat);
  }, [ANTHRO_DATA]);

  // Dados do atleta selecionado (últimas N avaliações)
  const athleteData = useMemo(() => {
    if (!selectedAthId) return [];
    return ANTHRO_DATA.filter(a => a.athleteId === selectedAthId)
      .sort((a,b) => new Date(b.date) - new Date(a.date))
      .slice(0, evalCount);
  }, [ANTHRO_DATA, selectedAthId, evalCount]);

  const latestAthlete = athleteData[0] || null;

  // Cards — grupo usa média dos mais recentes; atleta usa avaliação mais recente
  const teamAvg = useMemo(() => {
    const src = viewMode === 'atleta' && latestAthlete ? [latestAthlete] : latest;
    const n = src.length;
    if (n === 0) return { weight: 0, bf: 0, muscle: 0, bmi: 0 };
    const sum = src.reduce((acc, a) => ({
      weight: acc.weight + (a.weight||0),
      bf: acc.bf + (a.bodyFat||0),
      muscle: acc.muscle + (a.muscleMass||0),
      bmi: acc.bmi + (a.bmi||0)
    }), {weight:0, bf:0, muscle:0, bmi:0});
    return { weight: sum.weight/n, bf: sum.bf/n, muscle: sum.muscle/n, bmi: sum.bmi/n };
  }, [viewMode, latest, latestAthlete]);

  const evolutionByPos = useMemo(() => {
    // Average body fat by position group, by month
    const monthMap = new Map();
    ANTHRO_DATA.forEach(a => {
      const month = a.date.substring(0,7);
      const athlete = ATHLETES.find(at => at.id === a.athleteId);
      if (!athlete) return;
      const group = athlete.position === "GK" ? "GOL" :
                    ["CB","RB","LB"].includes(athlete.position) ? "DEF" :
                    ["CDM","CM","CAM"].includes(athlete.position) ? "MEI" : "ATA";
      const key = `${month}|${group}`;
      if (!monthMap.has(key)) monthMap.set(key, { month, group, sum: 0, count: 0 });
      const e = monthMap.get(key);
      e.sum += a.bodyFat;
      e.count += 1;
    });
    
    const months = [...new Set(Array.from(monthMap.values()).map(e => e.month))].sort();
    return months.map(m => {
      const row = { month: m.split('-').slice(1).join('/') };
      ["GOL","DEF","MEI","ATA"].forEach(g => {
        const e = monthMap.get(`${m}|${g}`);
        row[g] = e ? +(e.sum / e.count).toFixed(1) : null;
      });
      return row;
    });
  }, [ATHLETES, ANTHRO_DATA]);
  
  const selectedAth = ATHLETES.find(a => a.id === selectedAthId);
  const sublabelKPI = viewMode === 'atleta' && selectedAth ? selectedAth.nick || selectedAth.name : 'média do elenco';

  return (
    <div style={{display:'flex', flexDirection:'column', gap:20}}>

      {/* Filtros superiores */}

              padding:'6px 16px', borderRadius:6, border:'none', cursor:'pointer', fontWeight:600, fontSize:13,

        </div>

        {/* Seletor de atleta */}
        {viewMode === 'atleta' && (
          <select className="input" style={{maxWidth:220, fontSize:13}} value={selectedAthId} onChange={e => setSelectedAthId(e.target.value)}>
            <option value="">Selecionar atleta...</option>
            {ATHLETES.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
          </select>
        )}

        {/* Últimas N avaliações */}
        <div className="mono" style={{fontSize:11, color:'var(--text-tertiary)', marginLeft: viewMode==='atleta' ? 0 : 'auto'}}>AVALIAÇÕES:</div>
        <div style={{display:'flex', gap:4, padding:4, background:'var(--bg-tertiary)', borderRadius:8}}>
          {[{v:1,l:'Última'},{v:2,l:'Últ. 2'},{v:3,l:'Últ. 3'},{v:0,l:'Todas'}].map(o => (
            <button key={o.v} onClick={() => setEvalCount(o.v)} style={{
              padding:'5px 10px', borderRadius:6, border:'none', cursor:'pointer', fontWeight:600, fontSize:12,
              background: evalCount===o.v ? 'var(--accent-primary)' : 'transparent',
              color: evalCount===o.v ? 'var(--bg-primary)' : 'var(--text-secondary)'

        </div>
      </div>

      {/* KPI cards — adapta ao modo */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))', gap:12}}>
        <KPICard icon="Scale" label="Peso" value={`${teamAvg.weight.toFixed(1)}kg`} sublabel={sublabelKPI} color="var(--accent-primary)" delay={0}/>
        <KPICard icon="Activity" label="% Gordura" value={`${teamAvg.bf.toFixed(1)}%`} sublabel={sublabelKPI} color="var(--accent-warning)" delay={1}/>
        <KPICard icon="Dumbbell" label="Massa Muscular" value={`${teamAvg.muscle.toFixed(1)}kg`} sublabel={sublabelKPI} color="var(--accent-success)" delay={2}/>
        <KPICard icon="Ruler" label="IMC" value={teamAvg.bmi.toFixed(1)} sublabel={sublabelKPI} color="var(--accent-secondary)" delay={3}/>
      </div>
      
      <div className="card" style={{padding:24}}>

        <ResponsiveContainer width="100%" height={300}>
          {viewMode==='atleta' && selectedAthId ? (
            <ComposedChart data={(() => {
              const src = ANTHRO_DATA.filter(a => a.athleteId === selectedAthId)
                .sort((a,b) => new Date(a.date)-new Date(b.date));
              const sliced = evalCount > 0 ? src.slice(-evalCount) : src;
              return sliced.map(a => ({date: fmt.shortDate(a.date), peso:a.weight, gordura:a.bodyFat, massa:a.muscleMass}));
            })()}>
              <CartesianGrid stroke="rgba(255,255,255,0.05)" strokeDasharray="3 3" vertical={false}/>

              <YAxis yAxisId="right" orientation="right" stroke="var(--text-tertiary)" fontSize={11}/>
              <Tooltip content={<CustomTooltip/>}/>
              <Line yAxisId="left" type="monotone" dataKey="peso" name="Peso (kg)" stroke="#C5FF3E" strokeWidth={2.5} dot={{r:5}}/>
              <Line yAxisId="left" type="monotone" dataKey="massa" name="Massa Musc. (kg)" stroke="#00D9FF" strokeWidth={2} dot={{r:4}}/>
              <Line yAxisId="right" type="monotone" dataKey="gordura" name="% Gordura" stroke="#FF9E2C" strokeWidth={2} dot={{r:4}}/>
              <Legend wrapperStyle={{fontSize:12}}/>
            </ComposedChart>
          ) : (
            <LineChart data={evolutionByPos}>
              <CartesianGrid stroke="rgba(255,255,255,0.05)" strokeDasharray="3 3" vertical={false}/>
              <XAxis dataKey="month" stroke="var(--text-tertiary)" fontSize={11}/>
              <YAxis stroke="var(--text-tertiary)" fontSize={11} domain={[6,18]}/>
              <Tooltip content={<CustomTooltip/>}/>
              <Line type="monotone" dataKey="GOL" stroke="#FFB627" strokeWidth={2.5} dot={{r:4}}/>
              <Line type="monotone" dataKey="DEF" stroke="#00D9FF" strokeWidth={2.5} dot={{r:4}}/>
              <Line type="monotone" dataKey="MEI" stroke="#C5FF3E" strokeWidth={2.5} dot={{r:4}}/>
              <Line type="monotone" dataKey="ATA" stroke="#FF3B5C" strokeWidth={2.5} dot={{r:4}}/>
              <Legend wrapperStyle={{fontSize:12}}/>
            </LineChart>
          )}
        </ResponsiveContainer>
      </div>
      
      <div className="card" style={{padding:24}}>
        <SectionTitle subtitle="Detalhes">{viewMode==='atleta' && selectedAth ? `${selectedAth.nick||selectedAth.name} — Histórico de Avaliações` : 'Avaliação Mais Recente — Elenco'}</SectionTitle>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%', borderCollapse:'collapse', minWidth:800}}>
            <thead>
              <tr style={{borderBottom:'1px solid var(--border-default)'}}>
                {viewMode==='grupo' && <th style={thStyle}>Atleta</th>}

                <th style={{...thStyle, textAlign:'right'}}>Altura</th>

                <th style={{...thStyle, textAlign:'right'}}>Coxa</th>

              {(viewMode==='atleta' && selectedAthId ? athleteData : latest).map((a, i) => {

const InjuriesPage = () => {
  const { athletes: ATHLETES = [], injuries: INJURIES = [], trainingData: TRAINING_DATA = [] } = useData() || {};
  const [filterStatus, setFilterStatus]     = useState("all");
  const [filterSeverity, setFilterSeverity] = useState("all");
  const [filterAthlete, setFilterAthlete]   = useState("all");
  const [filterPeriod, setFilterPeriod]     = useState(0);    // 0 = todos, N = últimos N dias
  const [clickedMonth, setClickedMonth]     = useState(null); // mês seleccionado no gráfico
  const [clickedType, setClickedType]       = useState(null); // tipo seleccionado no pie

  const isActive = (i) => i.status && i.status.toLowerCase().indexOf('alta') === -1;

  // Base filtrada — inclui filtro de atleta, data, status, gravidade e cliques nos gráficos
  const filtered = useMemo(() => {
    return INJURIES.filter(inj => {
      if (filterAthlete !== "all" && inj.athleteId !== filterAthlete) return false;
      if (filterStatus !== "all" && inj.status !== filterStatus) return false;
      if (filterSeverity !== "all" && inj.severity !== filterSeverity) return false;
      if (filterPeriod > 0) {
        const ago = daysAgoCal(inj.dateObj);
        if (ago < 0 || ago > filterPeriod) return false;
      }
      if (clickedMonth && !inj.date.startsWith(clickedMonth)) return false;
      if (clickedType && inj.type !== clickedType) return false;
      return true;
    });
  }, [filterStatus, filterSeverity, filterAthlete, filterPeriod, clickedMonth, clickedType, INJURIES]);

  // KPI cards usam filtered para reflectir cliques nos gráficos
  const stats = useMemo(() => ({
    total: filtered.length,
    active: filtered.filter(isActive).length,
    grave: filtered.filter(i => i.severity === "Grave").length,
    avgRecovery: filtered.length ? Math.round(filtered.reduce((s,i) => s + (i.recoveryDays||0), 0) / filtered.length) : 0
  }), [filtered]);

  const resetChartFilters = () => { setClickedMonth(null); setClickedType(null); };
  const hasChartFilter = clickedMonth || clickedType;

  // Distribution by region (de filtered)
  const byRegion = useMemo(() => {
    const map = new Map();
    filtered.forEach(i => {
      const loc = i.location || 'Não especificado';
      map.set(loc, (map.get(loc) || 0) + 1);
    });
    return Array.from(map.entries())
      .map(([name, value]) => ({name, value}))
      .sort((a,b) => b.value - a.value)
      .slice(0, 10);
  }, [filtered]);
  
  // Distribution by type (de filtered)
  const byType = useMemo(() => {
    const map = new Map();
    filtered.forEach(i => { map.set(i.type, (map.get(i.type) || 0) + 1); });
    const colors = ["#FF3B5C", "#FF9E2C", "#C5FF3E", "#00D9FF", "#B794F6"];
    return Array.from(map.entries())
      .map(([name, value], i) => ({name, value, fill: colors[i % colors.length]}));
  }, [filtered]);
  
  // Monthly timeline (sempre de INJURIES para contexto geral, mas highlight no clique)
  const timeline = useMemo(() => {
    const base = filterAthlete !== 'all' ? INJURIES.filter(i => i.athleteId === filterAthlete) : INJURIES;
    const map = new Map();
    base.forEach(i => {
      const month = i.date.substring(0, 7);
      if (!map.has(month)) map.set(month, {month, leve:0, moderada:0, grave:0});
      const e = map.get(month);
      if (i.severity === "Leve") e.leve++;
      else if (i.severity === "Moderada") e.moderada++;
      else e.grave++;
    });
    return Array.from(map.values())
      .sort((a,b) => a.month.localeCompare(b.month))
      .slice(-12)
      .map(m => ({...m, monthShort: m.month.split('-').slice(1).join('/'),
        selected: clickedMonth === m.month}));
  }, [INJURIES, filterAthlete, clickedMonth]);
  
  return (
    <div style={{display:'flex', flexDirection:'column', gap:20}}>

      {/* Filtros superiores */}
      <div className="card" style={{padding:16, display:'flex', gap:10, alignItems:'center', flexWrap:'wrap'}}>
        <select className="input" style={{maxWidth:200, fontSize:13}} value={filterAthlete} onChange={e => { setFilterAthlete(e.target.value); resetChartFilters(); }}>
          <option value="all">Todos os atletas</option>
          {ATHLETES.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
        </select>
        <div className="mono" style={{fontSize:11, color:'var(--text-tertiary)'}}>PERÍODO:</div>
        <div style={{display:'flex', gap:4, padding:4, background:'var(--bg-tertiary)', borderRadius:8}}>
          {[{v:0,l:'Todos'},{v:30,l:'30d'},{v:90,l:'90d'},{v:180,l:'180d'},{v:365,l:'1 ano'}].map(o => (
            <button key={o.v} onClick={() => { setFilterPeriod(o.v); resetChartFilters(); }} style={{
              padding:'5px 10px', borderRadius:6, border:'none', cursor:'pointer', fontWeight:600, fontSize:12,
              background: filterPeriod===o.v ? 'var(--accent-primary)' : 'transparent',
              color: filterPeriod===o.v ? 'var(--bg-primary)' : 'var(--text-secondary)'
            }}>{o.l}</button>
          ))}
        </div>
        {hasChartFilter && (
          <button onClick={resetChartFilters} className="btn btn-ghost" style={{fontSize:12, height:34, marginLeft:'auto', color:'var(--accent-secondary)'}}>
            <Icon name="X" size={13}/> Limpar filtro gráfico
          </button>
        )}
      </div>

      {/* KPIs — reflectem o filtro activo */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))', gap:12}}>
        <KPICard icon="Heart" label="Total Lesões" value={stats.total} sublabel={hasChartFilter ? 'filtrado' : 'no período'} color="var(--accent-secondary)" delay={0}/>
        <KPICard icon="AlertCircle" label="Ativas" value={stats.active} sublabel="em recuperação" color="var(--accent-danger)" delay={1}/>
        <KPICard icon="AlertTriangle" label="Graves" value={stats.grave} sublabel="no período" color="var(--accent-warning)" delay={2}/>
        <KPICard icon="Clock" label="Recup. Média" value={`${stats.avgRecovery}d`} sublabel="por lesão" color="var(--accent-primary)" delay={3}/>
      </div>
      
      <div className="card" style={{padding:24}}>
        <SectionTitle subtitle="Histórico" action={clickedMonth && <button onClick={() => setClickedMonth(null)} className="btn btn-ghost" style={{fontSize:11, height:28, padding:'0 10px'}}>✕ {clickedMonth}</button>}>
          Lesões por Mês (12 meses) {!hasChartFilter && <span style={{fontSize:12, color:'var(--text-tertiary)', fontWeight:400}}> — clique numa barra para filtrar</span>}
        </SectionTitle>
        <ResponsiveContainer width="100%" height={260}>
          <BarChart data={timeline} onClick={({activePayload}) => {
            if (!activePayload?.[0]) return;
            const m = activePayload[0].payload.month;
            setClickedType(null);
            setClickedMonth(prev => prev === m ? null : m);
          }} style={{cursor:'pointer'}}>
            <CartesianGrid stroke="rgba(255,255,255,0.05)" strokeDasharray="3 3" vertical={false}/>
            <XAxis dataKey="monthShort" stroke="var(--text-tertiary)" fontSize={11}/>
            <YAxis stroke="var(--text-tertiary)" fontSize={11}/>
            <Tooltip content={<CustomTooltip/>}/>
            <Bar dataKey="leve" name="Leve" stackId="a" fill="#00E676" radius={[0,0,0,0]}/>
            <Bar dataKey="moderada" name="Moderada" stackId="a" fill="#FF9E2C"/>
            <Bar dataKey="grave" name="Grave" stackId="a" fill="#FF3B5C" radius={[6,6,0,0]}/>
            <Legend wrapperStyle={{fontSize:12}}/>
          </BarChart>
        </ResponsiveContainer>
      </div>
      
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16}}>
        <div className="card" style={{padding:24}}>
          <SectionTitle subtitle="Distribuição">Por Região Corporal</SectionTitle>
          <ResponsiveContainer width="100%" height={300}>
            <BarChart data={byRegion} layout="vertical" margin={{left:80}}>
              <CartesianGrid stroke="rgba(255,255,255,0.05)" strokeDasharray="3 3" horizontal={false}/>
              <XAxis type="number" stroke="var(--text-tertiary)" fontSize={10}/>
              <YAxis type="category" dataKey="name" stroke="var(--text-tertiary)" fontSize={11} width={80}/>
              <Tooltip content={<CustomTooltip/>}/>
              <Bar dataKey="value" name="Lesões" fill="#FF3B5C" radius={[0,4,4,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
        
        <div className="card" style={{padding:24}}>
          <SectionTitle subtitle="Tipo" action={clickedType && <button onClick={() => setClickedType(null)} className="btn btn-ghost" style={{fontSize:11, height:28, padding:'0 10px'}}>✕ {clickedType}</button>}>
            Distribuição por Tipo
          </SectionTitle>
          <ResponsiveContainer width="100%" height={300}>
            <PieChart onClick={({activePayload}) => {
              if (!activePayload?.[0]) return;
              const t = activePayload[0].name;
              setClickedMonth(null);
              setClickedType(prev => prev === t ? null : t);
            }} style={{cursor:'pointer'}}>
              <Pie data={byType} dataKey="value" nameKey="name" innerRadius={60} outerRadius={100} paddingAngle={3}>
                {byType.map((e,i) => <Cell key={i} fill={e.fill} stroke="var(--bg-secondary)" strokeWidth={clickedType===e.name ? 4 : 2} opacity={clickedType && clickedType!==e.name ? 0.45 : 1}/>)}
              </Pie>
              <Tooltip content={<CustomTooltip/>}/>
              <Legend wrapperStyle={{fontSize:11}}/>
            </PieChart>
          </ResponsiveContainer>
        </div>
      </div>
      
      {/* Injury list */}
      <div className="card" style={{padding:24}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16, flexWrap:'wrap', gap:12}}>
          <SectionTitle subtitle="Registros">Histórico Completo <span style={{fontSize:13, color:'var(--text-tertiary)', fontWeight:400}}>({filtered.length})</span></SectionTitle>
          <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
            <select className="input" style={{maxWidth:160, fontSize:13}} value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
              <option value="all">Todos status</option>
              <option value="Ativo">Ativas</option>
              <option value="Em tratamento">Em tratamento</option>
              <option value="Recuperado">Recuperados</option>
            </select>
            <select className="input" style={{maxWidth:160, fontSize:13}} value={filterSeverity} onChange={e => setFilterSeverity(e.target.value)}>
              <option value="all">Toda gravidade</option>
              <option value="Leve">Leve</option>
              <option value="Moderada">Moderada</option>
              <option value="Grave">Grave</option>
            </select>
          </div>
        </div>
        
        <div style={{maxHeight:480, overflowY:'auto'}}>
          <table style={{width:'100%', borderCollapse:'collapse'}}>
            <thead style={{position:'sticky', top:0, background:'var(--bg-secondary)', zIndex:1}}>
              <tr style={{borderBottom:'1px solid var(--border-default)'}}>
                <th style={thStyle}>Atleta</th>
                <th style={thStyle}>Tipo</th>
                <th style={thStyle}>Região</th>
                <th style={thStyle}>Mecanismo</th>
                <th style={thStyle}>Gravidade</th>
                <th style={{...thStyle, textAlign:'right'}}>Recup.</th>
                <th style={{...thStyle, textAlign:'right'}}>Data</th>
                <th style={thStyle}>Status</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((inj, i) => (
                <tr key={i} style={{borderBottom:'1px solid var(--border-subtle)'}}>
                  <td style={tdStyle}>
                    <div style={{display:'flex', alignItems:'center', gap:8}}>
                      <span className="badge" style={{background:positionColor(inj.position)+'20', color:positionColor(inj.position), padding:'2px 6px', fontSize:9}}>{inj.position}</span>
                      <span style={{fontWeight:600, fontSize:13}}>{inj.athleteNick}</span>
                    </div>
                  </td>
                  <td style={tdStyle}>{inj.type}</td>
                  <td style={tdStyle}>{inj.location}</td>
                  <td style={{...tdStyle, color:'var(--text-secondary)', fontSize:12}}>{inj.mechanism}</td>
                  <td style={tdStyle}>
                    <span className="badge" style={{background:severityColor(inj.severity)+'20', color:severityColor(inj.severity)}}>{inj.severity}</span>
                  </td>
                  <td style={{...tdStyle, textAlign:'right'}} className="mono tabular">{inj.recoveryDays}d</td>
                  <td style={{...tdStyle, textAlign:'right', color:'var(--text-tertiary)'}} className="mono">{fmt.shortDate(inj.date)}</td>
                  <td style={tdStyle}>
                    <span className="badge" style={{background:statusColor(inj.status)+'20', color:statusColor(inj.status)}}>
                      <div style={{width:6, height:6, borderRadius:'50%', background:statusColor(inj.status)}}/>
                      {inj.status}
                    </span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

  const [copiedId, setCopiedId] = useState(null);
  const [autoLoading, setAutoLoading] = useState(false);
  const [autoMsg, setAutoMsg] = useState('');

  // Links dos formulários — estado React para inputs reactivos
  const [formLinks, setFormLinks] = React.useState(() => (getConfig()?.formLinks) || {});

  const saveLink = (id, value) => {
    const cfg = getConfig() || {};
    const newLinks = { ...formLinks, [id]: value };
    setFormLinks(newLinks);
    saveConfig({ ...cfg, formLinks: newLinks });
  };

  const copyLink = (id, url) => {
    if (!url) return;
    navigator.clipboard.writeText(url).then(() => {
      setCopiedId(id);
      setTimeout(() => setCopiedId(null), 2000);
    });
  };

  // Auto-carregar links da aba _INSTALACAO da planilha
  const carregarLinksAuto = async () => {
    const cfg = getConfig();
    if (!cfg) return;
    setAutoLoading(true); setAutoMsg('');
    try {
      const rows = await fetchSheet(cfg.spreadsheetId, cfg.apiKey, '_INSTALACAO');
      // Extrair URLs dos Google Forms (padrão: https://docs.google.com/forms/d/e/.../viewform)
      const allText = rows.flat().join(' ');
      const formRegex = /https:\/\/docs\.google\.com\/forms\/d\/e\/[A-Za-z0-9_-]+\/viewform[^\s"]*/g;
      const urls = [...new Set(allText.match(formRegex) || [])];

      // Mapear para os IDs conhecidos dos formulários pela ordem de aparecimento
      // A aba _INSTALACAO lista os forms por ordem: form1, form2A, form2B, form3A, form4, form5
      const formIds = ['form1','form2A','form2B','form3A','form4','form5'];
      const newLinks = { ...formLinks };
      urls.forEach((url, i) => { if (i < formIds.length) newLinks[formIds[i]] = url; });

      if (urls.length === 0) {
        setAutoMsg('Nenhum link encontrado. Certifique-se que o script foi instalado na planilha.');
      } else {
        setFormLinks(newLinks);
        const cfg2 = getConfig() || {};
        saveConfig({ ...cfg2, formLinks: newLinks });
        setAutoMsg(`✅ ${urls.length} link(s) carregado(s) automaticamente!`);
      }

const CalendarPage = () => {
  const { trainingData: TRAINING_DATA = [] } = useData() || {};
  const [currentMonth, setCurrentMonth] = useState(new Date());
  
  const monthData = useMemo(() => {
    const year = currentMonth.getFullYear();
    const month = currentMonth.getMonth();
    const first = new Date(year, month, 1);
    const last = new Date(year, month+1, 0);
    const startWeekday = first.getDay();
    
    const days = [];
    // Empty cells before
    for (let i = 0; i < startWeekday; i++) days.push(null);
    // Actual days
    for (let d = 1; d <= last.getDate(); d++) {
      const date = new Date(year, month, d);
      const dateStr = date.toISOString().split('T')[0];
      const sessions = TRAINING_DATA.filter(t => t.date === dateStr);
      const matches = sessions.filter(s => s.isMatchDay);
      const totalLoad = sessions.reduce((s,t) => s + t.internalLoad, 0);
      days.push({
        date: d,
        dateStr,
        full: date,
        isToday: date.toDateString() === new Date().toDateString(),
        sessionCount: sessions.length,
        isMatch: matches.length > 0,
        load: totalLoad,
        isFuture: date > new Date()
      });
    }
    return days;
  }, [currentMonth]);
  
  const monthName = currentMonth.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
  
  return (
    <div style={{display:'flex', flexDirection:'column', gap:20}}>
      <div className="card" style={{padding:24}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24}}>
          <div>
            <div className="mono" style={{fontSize:11, color:'var(--accent-primary)', textTransform:'uppercase', letterSpacing:'0.2em', marginBottom:4}}>◢ Programação</div>
            <h2 className="headline" style={{fontSize:28, margin:0, fontWeight:700, textTransform:'capitalize'}}>{monthName}</h2>
          </div>
          <div style={{display:'flex', gap:8}}>
            <button className="btn btn-ghost" onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth()-1, 1))}><Icon name="ChevronLeft" size={16}/></button>
            <button className="btn btn-ghost" onClick={() => setCurrentMonth(new Date())}>Hoje</button>
            <button className="btn btn-ghost" onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth()+1, 1))}><Icon name="ChevronRight" size={16}/></button>
          </div>
        </div>
        
        <div style={{display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:8}}>
          {["DOM","SEG","TER","QUA","QUI","SEX","SÁB"].map(d => (
            <div key={d} className="mono" style={{padding:'8px 4px', textAlign:'center', fontSize:10, color:'var(--text-tertiary)', letterSpacing:'0.15em', fontWeight:600}}>{d}</div>
          ))}
          {monthData.map((day, i) => {
            if (!day) return <div key={i}/>;
            const intensityColor = day.load > 1500 ? 'var(--accent-danger)' : day.load > 800 ? 'var(--accent-warning)' : 'var(--accent-primary)';
            return (
              <div key={i} style={{
                aspectRatio:'1',
                padding:8,
                background: day.isToday ? 'var(--accent-primary)' : 'var(--bg-tertiary)',
                color: day.isToday ? 'var(--bg-primary)' : (day.isFuture ? 'var(--text-tertiary)' : 'var(--text-primary)'),
                borderRadius:10,
                border: day.isMatch ? `2px solid ${day.isToday ? 'var(--bg-primary)' : 'var(--accent-warning)'}` : '1px solid transparent',
                cursor:'pointer',
