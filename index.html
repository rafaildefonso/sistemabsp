// ═══════════════════════════════════════════════════════════════
// APP — versão v2 com Google Sheets integration
// ═══════════════════════════════════════════════════════════════
const App = () => {
  const [user, setUser]                   = useState(null);
  const [page, setPage]                   = useState("overview");
  const [selectedAthlete, setSelectedAthlete] = useState(null);
  const [selectedForm, setSelectedForm]   = useState(null);
  const [splash, setSplash]               = useState(true);

  // Data state — null = not loaded, object = real/demo data
  const [appData, setAppData]             = useState(null);
  const [dataMode, setDataMode]           = useState(null); // 'real' | 'demo'
  const [setup, setSetup]                 = useState(false);
  const [lastSync, setLastSync]           = useState(null);
  const [syncing, setSyncing]             = useState(false);

  // Notificações e settings
  const [notifications, setNotifications] = useState([]);
  const [settings, setSettings]           = useState(getSettings());

  // Aplicar tema no arranque e sempre que mudar
  useEffect(() => { aplicarTema(settings); }, [settings]);

  // Processar notificações quando os dados mudam
  const processarNotificacoes = React.useCallback((data) => {
    const s = getSettings();
    if (!s.notifEnabled) { setNotifications([]); return; }
    const novas = gerarNotificacoes(data);
    if (novas.length > 0) {
      setNotifications(novas.map(n => ({ ...n, lida: false })));
    }
    atualizarSnapshotNotif(data);
  }, []);

  const marcarNotifsLidas = () => setNotifications(prev => prev.map(n => ({ ...n, lida: true })));
  const limparNotifs = () => {
    // Ao limpar, registar hoje para notificações persistentes (só voltam amanhã)
    try { localStorage.setItem('bsp_notif_lesativas_dismissed', new Date().toISOString().slice(0,10)); } catch {}
    setNotifications([]);
  };

  // Função de refresh — pode ser chamada manual ou automaticamente
  const refreshData = React.useCallback(async (silent = false) => {
    const cfg = getConfig();
    if (!cfg || dataMode === 'demo') return;
    if (!silent) setSyncing(true);
    try {
      const data = await fetchAllData(cfg.spreadsheetId, cfg.apiKey);
      setAppData(data);
      setLastSync(new Date());
      processarNotificacoes(data);
    } catch (e) {
      console.warn('Auto-refresh falhou:', e.message);
    } finally {
      if (!silent) setSyncing(false);
    }
  }, [dataMode, processarNotificacoes]);

  // On mount: check if config exists → try auto-connect
  useEffect(() => {
    const t = setTimeout(async () => {
      setSplash(false);
      const cfg = getConfig();
      if (cfg) {
        try {
          const data = await fetchAllData(cfg.spreadsheetId, cfg.apiKey);
          setAppData(data);
          setDataMode('real');
          setLastSync(new Date());
          processarNotificacoes(data);
          // Restaurar sessão guardada (se não expirada)
          const savedUser = getSession();
          if (savedUser) setUser(savedUser);
        } catch {
          setSetup(true);
        }
      } else {
        setSetup(true);
      }
    }, 1400);
    return () => clearTimeout(t);
  }, []);

  // Auto-refresh conforme intervalo das configurações (só modo real)
  useEffect(() => {
    if (dataMode !== 'real') return;
    const mins = settings.refreshInterval || 0;
    if (mins <= 0) return; // manual
    const interval = setInterval(() => refreshData(true), mins * 60 * 1000);
    return () => clearInterval(interval);
  }, [dataMode, refreshData, settings.refreshInterval]);

  // Demo mode — use mock data
  const handleDemo = () => {
    const demoData = {
      athletes: ATHLETES,
      trainingData: TRAINING_DATA,
      gpsData: GPS_DATA,
      anthroData: ANTHRO_DATA,
      injuries: INJURIES
    };
    setAppData(demoData);
    setDataMode('demo');
    setSetup(false);
    setLastSync(new Date());
    processarNotificacoes(demoData);
  };

  // Real connection succeeded
  const handleConnected = (data) => {
    setAppData(data);
    setDataMode('real');
    setSetup(false);
    setLastSync(new Date());
    processarNotificacoes(data);
  };

  // Disconnect / reconfigure
  const handleDisconnect = () => {
    clearConfig();
    clearSession();
    setAppData(null);
    setDataMode(null);
    setUser(null);
    setSetup(true);
  };

  // Splash
  if (splash) {
    return (
      <div style={{
        position:'fixed', inset:0,
        background:'var(--bg-primary)',
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
        gap:20
      }}>
        <div style={{
          width:80, height:80, borderRadius:20,
          background:'var(--accent-primary)',
          display:'flex', alignItems:'center', justifyContent:'center',
          boxShadow:'var(--glow-primary)',
          animation:'glow 2s ease-in-out infinite'
        }}>
          <Icon name="Zap" size={40} color="var(--bg-primary)"/>
        </div>
        <div className="display animate-fadeUp" style={{fontSize:32, letterSpacing:'0.05em'}}>SISTEMABSP</div>
        <div className="mono animate-fadeUp stagger-2" style={{fontSize:11, color:'var(--text-tertiary)', letterSpacing:'0.2em'}}>LOADING ANALYTICS ENGINE...</div>
        <div style={{width:200, height:2, background:'var(--bg-tertiary)', borderRadius:1, overflow:'hidden', marginTop:8}}>
          <div style={{
            height:'100%', width:'60%',
            background:'var(--accent-primary)',
            animation:'shimmer 1.5s infinite linear',
            backgroundImage:'linear-gradient(90deg, transparent, var(--accent-primary), transparent)',
            backgroundSize:'200% 100%'
          }}/>
        </div>
      </div>
    );
  }

  // Setup screen (no config yet or failed)
  if (setup || !appData) {
    return (
      <ToastProvider>
        <SetupScreen onComplete={handleConnected} onDemo={handleDemo}/>
      </ToastProvider>
    );
  }

  // Login screen
  if (!user) {
    return (
      <ToastProvider>
        <DataContext.Provider value={{ ...appData, dataMode }}>
          <LoginScreen onLogin={(u) => { saveSession(u); setUser(u); }}/>
        </DataContext.Provider>
      </ToastProvider>
    );
  }

  const handleAddData = () => setPage('forms');

  return (
    <ToastProvider>
      <DataContext.Provider value={{ ...appData, dataMode }}>
        <div style={{display:'flex', height:'100vh', overflow:'hidden'}}>
          <Sidebar active={page} onNav={(p) => { setPage(p); setSelectedAthlete(null); setSelectedForm(null); }}/>
          <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden'}}>
            <Header
              user={user}
              page={page}
              onLogout={() => { clearSession(); setUser(null); }}
              onAddData={handleAddData}
              dataMode={dataMode}
              onDisconnect={handleDisconnect}
              lastSync={lastSync}
              syncing={syncing}
              onRefresh={() => refreshData(false)}
              onNav={setPage}
              onSelectAthlete={setSelectedAthlete}
              notifications={notifications}
              onClearNotifs={limparNotifs}
              onMarkRead={marcarNotifsLidas}
            />
            <div style={{flex:1, overflow:'auto', padding:'24px 28px', background:'var(--bg-primary)'}}>
              <div style={{maxWidth:1600, margin:'0 auto'}}>
                {page === "overview"  && <OverviewDashboard onNav={setPage} onSelectAthlete={setSelectedAthlete}/>}
                {page === "athletes" && <AthletesPage onSelectAthlete={setSelectedAthlete}/>}
                {page === "training" && <TrainingPage/>}
                {page === "gps"      && <GPSPage/>}
                {page === "anthro"   && <AnthroPage/>}
                {page === "injuries" && <InjuriesPage/>}
                {page === "forms"    && <FormsPage onSelectForm={setSelectedForm}/>}
                {page === "calendar" && <CalendarPage/>}
                {page === "settings" && <SettingsPage settings={settings} onChange={(s) => { setSettings(s); saveSettings(s); }} dataMode={dataMode} lastSync={lastSync} onDisconnect={handleDisconnect}/>}
              </div>
            </div>
          </div>
        </div>

        {selectedAthlete && <AthleteProfile athlete={selectedAthlete} onClose={() => setSelectedAthlete(null)}/>}
        {selectedForm    && <FormRenderer form={selectedForm} onClose={() => setSelectedForm(null)}/>}

        {/* Demo mode banner */}
        {dataMode === 'demo' && (
          <div style={{
            position:'fixed', bottom:16, left:'50%', transform:'translateX(-50%)',
            background:'var(--bg-elevated)', border:'1px solid var(--border-default)',
            borderLeft:'3px solid var(--accent-warning)',
            borderRadius:10, padding:'10px 20px',
            fontSize:13, color:'var(--accent-warning)',
            display:'flex', alignItems:'center', gap:10, zIndex:200,
            boxShadow:'var(--shadow-md)'
          }}>
            <Icon name="Eye" size={16}/>
            Modo demo — dados fictícios
            <button
              onClick={() => { setSetup(true); setUser(null); }}
              style={{background:'none', border:'none', color:'var(--accent-primary)', cursor:'pointer', fontSize:12, fontWeight:600, padding:'2px 8px', borderRadius:6, border:'1px solid rgba(197,255,62,0.3)'}}
            >
              Ligar planilha real →
            </button>
          </div>
        )}

        {/* Connected badge */}
        {dataMode === 'real' && (
          <div style={{
            position:'fixed', bottom:16, right:16,
            background:'var(--bg-elevated)', border:'1px solid var(--border-default)',
            borderLeft:'3px solid var(--accent-success)',
            borderRadius:10, padding:'8px 16px',
            fontSize:12, color:'var(--accent-success)',
            display:'flex', alignItems:'center', gap:8, zIndex:200
          }}>
            <Icon name="Wifi" size={14}/>
            Google Sheets conectado
          </div>
        )}
      </DataContext.Provider>
    </ToastProvider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
